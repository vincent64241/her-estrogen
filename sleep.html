<script>
  (function() {
    var nav = document.querySelector('.nav.nav-editorial');
    if (nav) nav.classList.add('scrolled');
  })();

  (function() {
    var KEY = 'he_offer_end';
    var elD = document.getElementById('annc-d');
    var elH = document.getElementById('annc-h');
    var elM = document.getElementById('annc-m');
    var elS = document.getElementById('annc-s');
    if (!elH) return;
    var end = sessionStorage.getItem(KEY);
    if (!end) { end = Date.now() + 3600*1000; sessionStorage.setItem(KEY, String(end)); }
    else end = parseInt(end, 10);
    function pad(n) { return n < 10 ? '0'+n : ''+n; }
    function tick() {
      var rem = Math.max(0, end - Date.now());
      if (elD) elD.textContent = pad(Math.floor(rem/86400000));
      elH.textContent = pad(Math.floor((rem%86400000)/3600000));
      elM.textContent = pad(Math.floor((rem%3600000)/60000));
      elS.textContent = pad(Math.floor((rem%60000)/1000));
      if (rem > 0) setTimeout(tick, 1000);
    }
    tick();
  })();

  (function() {
    function init() {
      var el = document.querySelector('.products-scroll-container');
      if (!el) { return setTimeout(init, 200); }
      var isDown = false, startX = 0, scrollLeft = 0;
      el.addEventListener('mousedown', function(e) {
        isDown = true; el.classList.add('dragging');
        startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; e.preventDefault();
      });
      ['mouseleave','mouseup'].forEach(function(evt) {
        el.addEventListener(evt, function() { isDown = false; el.classList.remove('dragging'); });
      });
      el.addEventListener('mousemove', function(e) {
        if (!isDown) return; e.preventDefault();
        var x = e.pageX - el.offsetLeft; el.scrollLeft = scrollLeft - (x - startX)*1.4;
      });
    }
    init();
  })();

  (function() {
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var tries = 0;
    function go() {
      var sec = document.querySelector('#root .science-v2');
      if (!sec && tries < 240) { tries++; return requestAnimationFrame(go); }
      if (!sec) return;
      var nums = sec.querySelectorAll('[data-count]');
      function run() {
        sec.classList.add('sci-go');
        if (reduce) return;
        nums.forEach(function(el) {
          var target = parseFloat(el.getAttribute('data-count'))||0;
          var dur = 1400, start = null;
          function tick(ts) {
            if (start===null) start=ts;
            var p = Math.min((ts-start)/dur,1);
            var eased = 1-Math.pow(1-p,3);
            el.textContent = Math.round(eased*target);
            if (p<1) requestAnimationFrame(tick); else el.textContent=target;
          }
          requestAnimationFrame(tick);
        });
      }
      if (reduce || !('IntersectionObserver' in window)) { run(); return; }
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) { if (e.isIntersecting) { run(); io.disconnect(); } });
      }, { threshold: 0.3 });
      io.observe(sec);
      setTimeout(function() { if (!sec.classList.contains('sci-go')) run(); }, 4000);
    }
    if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', go);
    else go();
  })();

  (function() {
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var pendingIo = null, setupDone = false;
    function inView(el) { var r=el.getBoundingClientRect(); return r.top < window.innerHeight*0.6 && r.bottom>0; }
    function revealVisible() { document.querySelectorAll('#root .write-on:not(.write-go)').forEach(function(el) { if (inView(el)) el.classList.add('write-go'); }); }
    function revealAll() { document.querySelectorAll('#root .write-on:not(.write-go)').forEach(function(el) { el.classList.add('write-go'); }); }
    function setup() {
      if (setupDone) return;
      if (!document.querySelectorAll('#root .write-on:not(.write-go)').length) return;
      setupDone = true;
      if (reduce) { revealAll(); return; }
      revealVisible();
      if ('IntersectionObserver' in window) {
        pendingIo = new IntersectionObserver(function(entries) {
          entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('write-go'); pendingIo.unobserve(e.target); } });
        }, { rootMargin: '0px 0px -40% 0px', threshold: 0 });
        document.querySelectorAll('#root .write-on:not(.write-go)').forEach(function(el) { pendingIo.observe(el); });
      }
      window.addEventListener('scroll', revealVisible, { passive: true });
    }
    setTimeout(revealAll, 5000);
    function watch() {
      var root = document.getElementById('root');
      if (!root) { setTimeout(watch, 50); return; }
      setup();
      if (setupDone) return;
      var mo = new MutationObserver(function() { setup(); if (setupDone) mo.disconnect(); });
      mo.observe(root, { childList: true, subtree: true });
    }
    if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', watch);
    else watch();
  })();
</script>
