<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Get approved — HerEstrogen</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=3" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png?v=3" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png?v=3" />
<link rel="shortcut icon" href="assets/favicon-32.png?v=3" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..600&family=DM+Sans:opsz,wght@9..40,300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #b8235c; --pink-2: #d04a7e; --pink-3: #ec84a8;
    --pink-soft: #fde8ef; --pink-softer: #fef5f8; --pink-deep: #8a1745;
    --ink: #1a1216; --ink-2: #3d2b33; --muted: #7a6770;
    --line: #f0d9e2; --line-2: #e8c5d2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(900px 600px at 90% 0%, var(--pink-soft) 0%, transparent 55%),
      radial-gradient(700px 500px at 0% 100%, var(--pink-softer) 0%, transparent 55%),
      #fff;
    color: var(--ink);
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }
  .top {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 32px; border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,.85); backdrop-filter: blur(10px);
  }
  .top img { height: 80px; width: auto; display: block; }
  .top-back { font-size: 14px; color: var(--ink-2); font-weight: 500; display: inline-flex; align-items: center; gap: 8px; }
  .top-back:hover { color: var(--pink); }
  .shell { max-width: 640px; margin: 0 auto; padding: 48px 32px 96px; }
  .shell.wide { max-width: 760px; }
  .progress-shell {
    display: flex; align-items: center; gap: 16px; margin-bottom: 40px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }
  .progress-bar { flex: 1; height: 6px; background: var(--pink-soft); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink) 0%, var(--pink-deep) 100%); transition: width .4s cubic-bezier(.4,0,.2,1); }
  .step h1, .step h2 {
    font-family: 'Lora', serif; font-weight: 500;
    font-size: clamp(26px, 3.6vw, 36px); line-height: 1.1;
    letter-spacing: -0.018em; margin: 0 0 14px;
  }
  .step h1 em, .step h2 em { font-style: italic; color: var(--pink); }
  .step-intro { font-size: 16px; color: var(--ink-2); line-height: 1.55; margin: 0 0 28px; }
  .step-subtle { font-size: 13.5px; color: var(--muted); line-height: 1.5; margin: -16px 0 24px; font-style: italic; }
  .step-info-block {
    background: var(--pink-softer); border-left: 3px solid var(--pink-3);
    border-radius: 8px; padding: 16px 18px; margin: 20px 0;
    font-size: 14.5px; color: var(--ink-2); line-height: 1.6;
  }
  .step-info-block strong { color: var(--pink-deep); }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    width: 100%; text-align: left;
    background: #fff; border: 1px solid var(--line); border-radius: 10px;
    padding: 16px 18px; font-size: 15px; font-weight: 500; color: var(--ink);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    transition: all .15s ease; line-height: 1.4;
  }
  .choice:hover { border-color: var(--pink-3); box-shadow: 0 4px 14px rgba(184,35,92,.07); }
  .choice.selected {
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-deep) 100%);
    color: #fff; border-color: var(--pink);
    box-shadow: 0 8px 22px rgba(184,35,92,.22);
  }
  .choice .check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--line-2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: transparent; font-size: 13px;
  }
  .choice.selected .check { background: #fff; border-color: #fff; color: var(--pink); }
  .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .field label {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--pink);
  }
  .field-opt { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted); text-transform: none; letter-spacing: 0; margin-left: 6px; font-weight: 400; }
  .field input, .field select, .field textarea {
    background: #fff; border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; font-family: inherit; font-size: 15px; color: var(--ink);
    transition: border-color .15s ease, box-shadow .15s ease; width: 100%;
  }
  .field textarea { min-height: 90px; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--pink); box-shadow: 0 0 0 4px rgba(184,35,92,.12); }
  .field-row3 { display: grid; grid-template-columns: 1.4fr 1fr 1.1fr; gap: 10px; }
  .field-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  /* P1-FIX5 — quiz mobile: 2-col paired fields stack; reclaim side padding
     so content (esp. the 3-up DOB row) isn't crushed at 320px. */
  @media (max-width: 560px) {
    .field-grid { grid-template-columns: 1fr; }
    .shell { padding-left: 20px; padding-right: 20px; }
  }
  /* Very narrow phones — tighten the DOB month/day/year selects so all three
     stay on one row and remain tappable without overflow. */
  @media (max-width: 380px) {
    .field-row3 { gap: 7px; }
    .field-row3 select {
      padding: 14px 8px; padding-right: 26px;
      background-position: right 8px center;
    }
  }
  .field-row3 select, .field-row2 select {
    background: #fff; border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 14px; font-family: inherit; font-size: 15px; color: var(--ink);
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none'><path d='M1 1.5L6 6.5L11 1.5' stroke='%23b8235c' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat: no-repeat; background-position: right 14px center;
    padding-right: 36px; cursor: pointer;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .field-error { font-size: 13px; color: var(--pink-deep); margin-top: 2px; }
  .paired-block { margin-bottom: 22px; }
  .paired-block-label { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 10px; line-height: 1.4; }
  .freq-row { display: flex; flex-direction: column; gap: 8px; }
  .freq-choice {
    background: #fff; border: 1px solid var(--line); border-radius: 8px;
    /* P1-FIX3: ≥44px tap target + 15px reading text for the 40-60yo cohort. */
    padding: 13px 16px; min-height: 44px; font-size: 15px; color: var(--ink); text-align: left;
    display: flex; align-items: center;
    transition: all .15s ease; width: 100%; cursor: pointer;
  }
  .freq-choice:hover { border-color: var(--pink-3); }
  .freq-choice.selected { background: var(--pink); color: #fff; border-color: var(--pink); }
  .actions { margin-top: 32px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 24px; border-radius: 999px; font-size: 15px; font-weight: 600; transition: all .2s ease; white-space: nowrap; }
  .btn-primary { background: var(--pink); color: #fff; box-shadow: 0 4px 18px rgba(184,35,92,.22); }
  .btn-primary:hover:not(:disabled) { background: var(--pink-deep); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
  .btn-back { background: transparent; color: var(--muted); font-weight: 500; }
  .btn-back:hover { color: var(--ink); }
  .footnote {
    margin-top: 24px; font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); letter-spacing: 0.06em;
    display: flex; align-items: center; gap: 8px;
  }
  .footnote::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--pink); }
  .agree-block { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 16px 18px; margin: 24px 0 12px; }
  .agree-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }
  .agree-row:last-child { margin-bottom: 0; }
  .agree-row input[type=checkbox] { margin-top: 3px; flex-shrink: 0; cursor: pointer; }
  .agree-row a { color: var(--pink); text-decoration: underline; }
  .finish { text-align: center; padding: 32px 0; }
  .finish-badge { width: 72px; height: 72px; border-radius: 50%; background: var(--pink-soft); color: var(--pink); font-size: 32px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 24px; }
  .finish h1 { font-family: 'Lora', serif; font-weight: 500; font-size: 38px; letter-spacing: -0.02em; margin: 0 0 12px; line-height: 1.1; }
  .finish h1 em { font-style: italic; color: var(--pink); }
  .finish p { font-size: 16px; color: var(--ink-2); max-width: 480px; margin: 0 auto 18px; line-height: 1.55; }
  .excluded-card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 36px 30px; margin: 24px auto; max-width: 600px; }
  .excluded-card h2 { font-family: 'Lora', serif; font-weight: 500; font-size: 26px; line-height: 1.15; letter-spacing: -0.01em; color: var(--pink-deep); margin: 0 0 14px; }
  .excluded-card .reason-list { margin: 14px 0; padding-left: 22px; font-size: 14.5px; line-height: 1.6; color: var(--ink-2); }
  .excluded-card .reason-list li { margin-bottom: 8px; }
  .excluded-card .safety-msg {
    background: var(--pink-softer); border-left: 3px solid var(--pink-3);
    border-radius: 8px; padding: 16px 18px; margin: 18px 0;
    font-size: 13.5px; color: var(--ink-2); line-height: 1.6;
    white-space: pre-wrap;
  }
  /* Inline safety block — surfaces in the question itself when a crisis-
     level exclusion option (Q2 yes, Q5B yes, Q9 post-meno bleeding) is
     chosen. Uses a higher-contrast pink border + "alert" head so it reads
     as urgent vs. the softer pink-softer info blocks elsewhere. */
  .inline-safety {
    background: #fff5f8; border: 1px solid var(--pink-3);
    border-left: 4px solid var(--pink-deep);
    border-radius: 10px; padding: 18px 20px; margin: 20px 0 0;
    font-size: 13.5px; color: var(--ink-2); line-height: 1.6;
    white-space: pre-wrap;
  }
  .inline-safety-head {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--pink-deep); font-weight: 700;
    margin-bottom: 10px; white-space: normal;
  }
</style>
