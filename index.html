  /* ─────────────────────────────────────────────
     LIFESTYLE STRIP — animated horizontal marquee
     Sits directly under the hero. Aspirational AI
     lifestyle imagery; NOT presented as patients
     (no names, no quotes, no outcome claims).
     CSS-only continuous scroll; pauses on hover.
     Edges fade to white via mask-image.
     Compliance audit C-06, H-13, C-11 safe.
     ───────────────────────────────────────────── */
  .lifestyle-strip {
    background: #fff;
    padding: 32px 0;
    overflow: hidden;
    position: relative;
    /* Soft fade on left/right edges */
    -webkit-mask-image: linear-gradient(to right, transparent 0, #000 8%, #000 92%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0, #000 8%, #000 92%, transparent 100%);
  }
  .lifestyle-strip-track {
    display: flex;
    gap: 18px;
    width: max-content;
    animation: lifestyleStripScroll 60s linear infinite;
    will-change: transform;
  }
  .lifestyle-strip:hover .lifestyle-strip-track {
    animation-play-state: paused;
  }
  .lifestyle-strip-item {
    flex: 0 0 auto;
    width: 280px;
    height: 220px;
    border-radius: 16px;
    overflow: hidden;
    background: var(--pink-soft);
    box-shadow: 0 4px 14px rgba(184, 35, 92, 0.08);
  }
  .lifestyle-strip-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* The track holds 2 copies of the image set. Scroll by exactly half the
     track width (i.e. one full set) for a seamless infinite loop. */
  @keyframes lifestyleStripScroll {
    from { transform: translate3d(0, 0, 0); }
    to   { transform: translate3d(-50%, 0, 0); }
  }
  /* Respect users who don't want motion */
  @media (prefers-reduced-motion: reduce) {
    .lifestyle-strip-track { animation: none; }
  }
  @media (max-width: 760px) {
    .lifestyle-strip { padding: 22px 0; }
    .lifestyle-strip-track { gap: 12px; animation-duration: 45s; }
    .lifestyle-strip-item { width: 200px; height: 160px; border-radius: 12px; }
  }

  /* ═══════════════════════════════════════════════════════════════
     SECTION 1 — BENTO HERO + TRUST MARQUEE
     Ported from design-reference v2 (layout + motion only).
     Palette + fonts are 100% Her Estrogen brand tokens.
     Reference apricot/blush/butter/sage → our pink/moss/gold family.
     Honors prefers-reduced-motion.
     ═══════════════════════════════════════════════════════════════ */
  .hero-bento { padding: 172px 0 88px; background: var(--paper); position: relative; }
  .hb-wrap { max-width: 1180px; margin: 0 auto; padding: 0 24px; }
  .hero-bento h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(40px, 6.4vw, 84px);
    line-height: 1.04;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin: 0 0 16px;
  }
  .hero-bento h1 em { font-style: italic; color: var(--pink); font-weight: 500; }
  .hero-bento .hb-sub {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 18px; line-height: 1.55; color: var(--ink-2);
    max-width: 620px; margin: 0 0 40px;
  }

  /* Bento grid: 1 tall primary + 4 symptom tiles */
  .hero-bento .bento {
    display: grid;
    grid-template-columns: 1.6fr 1fr 1fr;
    grid-template-rows: 230px 230px;
    gap: 16px;
  }
  .hero-bento .tile {
    border-radius: 26px; position: relative; overflow: hidden;
    text-decoration: none; color: var(--ink);
    display: flex; flex-direction: column; justify-content: flex-end; padding: 28px;
    background: var(--paper); border: 1px solid var(--line);
    transition: transform .35s cubic-bezier(.22,.7,.3,1), box-shadow .35s ease;
  }
  .hero-bento .tile h3 { font-family: 'Newsreader', Georgia, serif; font-weight: 500; font-size: 27px; line-height: 1.1; margin: 0 0 4px; color: var(--ink); }
  .hero-bento .tile p  { font-family: 'DM Sans', system-ui, sans-serif; font-size: 14px; color: var(--muted); margin: 0; }
  @media (hover: hover) and (pointer: fine) {
    .hero-bento .tile:hover { transform: translateY(-6px) scale(1.012); box-shadow: 0 24px 56px rgba(26,18,22,0.13); }
  }
  .hero-bento .tile .go {
    position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%;
    background: var(--ink); color: #fff; display: flex; align-items: center; justify-content: center;
    transition: transform .3s ease, background .3s ease;
  }
  @media (hover: hover) and (pointer: fine) {
    .hero-bento .tile:hover .go { transform: rotate(-45deg); background: var(--pink-deep); }
  }
  .hero-bento .tile .mini-art { position: absolute; top: 18px; left: 24px; opacity: .6; }

  /* Primary tile — brand pink radial + breathing blob */
  .hero-bento .tile.main {
    grid-row: 1 / 3; justify-content: space-between; padding: 34px; border: none;
    background: radial-gradient(120% 90% at 15% 10%, var(--pink-softer) 0%, var(--pink-soft) 42%, var(--pink) 135%);
  }
  .hero-bento .tile.main .blob {
    position: absolute; width: 340px; height: 340px; border-radius: 50%;
    background: radial-gradient(circle at 32% 32%, rgba(255,255,255,.85), rgba(184,35,92,.32) 70%);
    right: -90px; bottom: -110px; filter: blur(2px);
    animation: breathe 7s ease-in-out infinite; will-change: transform;
  }
  @keyframes breathe { 0%,100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.08) translateY(-14px); } }
  .hero-bento .tile.main h3 { font-size: clamp(28px, 3vw, 40px); max-width: 330px; position: relative; }
  .hero-bento .tile.main .pillrow { display: flex; gap: 8px; flex-wrap: wrap; position: relative; margin-top: 14px; }
  .hero-bento .pill-chip {
    font-family: 'DM Sans', system-ui, sans-serif; font-size: 12px; font-weight: 700; color: var(--ink);
    background: rgba(255,255,255,.78); border-radius: 100px; padding: 7px 14px; backdrop-filter: blur(4px);
  }
  .hero-bento .tile.main .hb-cta { align-self: flex-start; position: relative; margin-top: 24px; }
  .hero-bento .tile.main .hb-cta svg { transition: transform .25s ease; }
  @media (hover: hover) and (pointer: fine) {
    .hero-bento .tile.main:hover .hb-cta svg { transform: translateX(4px); }
  }

  /* Symptom tile tints — mapped to our pink / moss / gold family (no reference colors) */
  .hero-bento .tile.sleep { background: linear-gradient(150deg, var(--pink-softer), var(--pink-soft)); }
  .hero-bento .tile.heat  { background: linear-gradient(150deg, var(--pink-soft), #f6c9d8); }
  .hero-bento .tile.fog   { background: linear-gradient(150deg, #e9efe2, #d6e2cc); }
  .hero-bento .tile.mood  { background: linear-gradient(150deg, #f6ecd9, #efdcb6); }

  /* ── Hero tiles as darkened lifestyle-photo cards (per request) ──
     Each tile gets a lifestyle photo background + a dark scrim (brightness
     lowered) so the text stays readable. Hover lightens the scrim + lifts. */
  .hero-bento .tile.main,
  .hero-bento .tile.sleep,
  .hero-bento .tile.heat,
  .hero-bento .tile.fog,
  .hero-bento .tile.mood {
    background-size: cover; background-position: center; background-repeat: no-repeat;
    border: none;
  }
  .hero-bento .tile.main  { background-image: url('assets/lifestyle/lifestyle-1.jpg'); }
  .hero-bento .tile.sleep { background-image: url('assets/case-reading.jpg'); }
  .hero-bento .tile.heat  { background-image: url('assets/lifestyle/lifestyle-3.jpg'); }
  .hero-bento .tile.fog   { background-image: url('assets/lifestyle/lifestyle-2.jpg'); }
  .hero-bento .tile.mood  { background-image: url('assets/case-joy.jpg'); }
  /* Dark scrim overlay (the "brightness lowered" layer) */
  .hero-bento .tile.main::after,
  .hero-bento .tile.sleep::after,
  .hero-bento .tile.heat::after,
  .hero-bento .tile.fog::after,
  .hero-bento .tile.mood::after {
    content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: linear-gradient(180deg, rgba(26,18,22,.32) 0%, rgba(26,18,22,.68) 100%);
    transition: background .35s ease;
  }
  @media (hover: hover) and (pointer: fine) {
    .hero-bento .tile.main:hover::after,
    .hero-bento .tile.sleep:hover::after,
    .hero-bento .tile.heat:hover::after,
    .hero-bento .tile.fog:hover::after,
    .hero-bento .tile.mood:hover::after {
      background: linear-gradient(180deg, rgba(26,18,22,.14) 0%, rgba(26,18,22,.52) 100%);
    }
  }
  /* Lift content above the scrim + make text legible on photos */
  .hero-bento .tile > * { position: relative; z-index: 1; }
  .hero-bento .tile.main .blob { display: none; }
  .hero-bento .tile h3, .hero-bento .tile p { color: #fff; text-shadow: 0 1px 14px rgba(0,0,0,.45); }
  .hero-bento .tile .mini-art { stroke: #fff; opacity: .92; }
  .hero-bento .tile .go { background: rgba(26,18,22,.7); }

  /* Trust marquee (text ticker) */
  .trust-marquee {
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    padding: 18px 0; overflow: hidden; white-space: nowrap; background: var(--paper);
  }
  .trust-marquee .tm-track { display: inline-flex; gap: 58px; align-items: center; animation: tmScroll 32s linear infinite; }
  .trust-marquee:hover .tm-track { animation-play-state: paused; }
  @keyframes tmScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .trust-marquee .tm-track span {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 13px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); display: inline-flex; align-items: center; gap: 12px;
  }
  .trust-marquee .tm-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pink); flex-shrink: 0; }

  /* Reveal motion — hero is above the fold, so it animates on LOAD via pure
     CSS. Deliberately animates TRANSFORM ONLY (never opacity): content is
     always visible even if the animation engine doesn't run (e.g. a
     background/hidden tab pauses animations), so the hero can never be stuck
     invisible. Damped stagger via d1–d4. Reduced-motion: no animation. */
  @media (prefers-reduced-motion: no-preference) {
    @keyframes rvRise { from { transform: translateY(26px); } to { transform: none; } }
    .hero-bento .rv { animation: rvRise .7s cubic-bezier(.22,.7,.3,1) both; will-change: transform; }
    .hero-bento .rv.d1 { animation-delay: .08s; }
    .hero-bento .rv.d2 { animation-delay: .16s; }
    .hero-bento .rv.d3 { animation-delay: .24s; }
    .hero-bento .rv.d4 { animation-delay: .32s; }
  }
  @media (prefers-reduced-motion: reduce) {
    .hero-bento .tile.main .blob { animation: none; }
    .trust-marquee .tm-track { animation: none; }
  }

  /* Bento responsive */
  @media (max-width: 900px) {
    .hero-bento { padding: 128px 0 56px; }
    .hero-bento .bento { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
    .hero-bento .tile.main { grid-row: auto; grid-column: 1 / -1; min-height: 280px; }
    .hero-bento .tile { min-height: 150px; }
  }
  @media (max-width: 560px) {
    .hero-bento .bento { grid-template-columns: 1fr; }
    .hero-bento .tile.main { grid-column: auto; }
    .trust-marquee .tm-track { gap: 38px; animation-duration: 24s; }
  }

  /* Shared reveal for ported sections (transform-only, bulletproof) */
  @media (prefers-reduced-motion: no-preference) {
    .meds-v2 .rv, .science-v2 .rv, .final-v2 .rv { animation: rvRise .7s cubic-bezier(.22,.7,.3,1) both; will-change: transform; }
    .meds-v2 .rv.d1, .science-v2 .rv.d1, .final-v2 .rv.d1 { animation-delay: .08s; }
    .meds-v2 .rv.d2, .science-v2 .rv.d2, .final-v2 .rv.d2 { animation-delay: .16s; }
    .meds-v2 .rv.d3, .science-v2 .rv.d3, .final-v2 .rv.d3 { animation-delay: .24s; }
    .meds-v2 .rv.d4, .science-v2 .rv.d4, .final-v2 .rv.d4 { animation-delay: .32s; }
  }

  /* Shared eyebrow chip for ported sections (brand pink, not reference apricot) */
  .meds-v2 .eyebrow-chip, .science-v2 .eyebrow-chip {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase;
    color: var(--pink-deep); background: var(--pink-soft);
    border-radius: 100px; padding: 8px 16px; margin-bottom: 20px;
  }
  .meds-v2 .v2-title, .science-v2 .v2-title {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(34px, 4.4vw, 58px); line-height: 1.06; letter-spacing: -0.02em;
    color: var(--ink); max-width: 760px; margin: 0;
  }
  .meds-v2 .v2-title em, .science-v2 .v2-title em { font-style: italic; color: var(--pink); }
  .meds-v2 .v2-sub, .science-v2 .v2-sub {
    font-family: 'DM Sans', system-ui, sans-serif; color: var(--ink-2);
    max-width: 560px; margin-top: 16px; font-size: 17px; line-height: 1.55;
  }

  /* ═══ SECTION 2 — MEDS GRID + MINI-QUIZ (ported, brand-skinned) ═══ */
  .meds-v2 { background: var(--paper); }
  .meds-v2 .med-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-top: 48px; }
  .meds-v2 .med {
    background: var(--pink-softer); border: 1px solid var(--line); border-radius: 22px;
    padding: 24px 18px 22px; text-align: left;
    transition: transform .32s ease, box-shadow .32s ease;
  }
  @media (hover: hover) and (pointer: fine) {
    .meds-v2 .med:hover { transform: translateY(-7px); box-shadow: 0 22px 48px rgba(26,18,22,0.11); }
  }
  .meds-v2 .badges { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .meds-v2 .badge { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; border-radius: 100px; padding: 4px 10px; }
  .meds-v2 .badge.fda { background: var(--ink); color: #fff; }
  .meds-v2 .badge.form { background: var(--pink-soft); color: var(--pink-deep); }
  .meds-v2 .med-visual { height: 96px; border-radius: 14px; margin-bottom: 18px; display: flex; align-items: center; justify-content: center; background: linear-gradient(140deg, var(--pink-soft), var(--pink-softer)); }
  .meds-v2 .med:nth-child(2) .med-visual { background: linear-gradient(140deg, #f3e3ea, var(--pink-soft)); }
  .meds-v2 .med:nth-child(3) .med-visual { background: linear-gradient(140deg, #f6ecd9, #f0dcb6); }
  .meds-v2 .med:nth-child(4) .med-visual { background: linear-gradient(140deg, #e9efe2, #d6e2cc); }
  .meds-v2 .med:nth-child(5) .med-visual { background: linear-gradient(140deg, #fad7e1, var(--pink-soft)); }
  .meds-v2 .med-visual svg { color: var(--pink-deep); opacity: .85; }
  .meds-v2 .med h3 { font-family: 'Newsreader', Georgia, serif; font-weight: 500; font-size: 21px; margin: 0 0 2px; color: var(--ink); }
  .meds-v2 .med .form-name { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .meds-v2 .med .price { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; color: var(--ink); }
  .meds-v2 .med .price b { font-family: 'Newsreader', Georgia, serif; font-size: 20px; color: var(--pink-deep); }
  .meds-v2 .med .price small { color: var(--muted); font-weight: 500; }
  .meds-v2 .fineprint { font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--muted); margin-top: 26px; max-width: 820px; line-height: 1.7; }

  .meds-v2 .mini-quiz {
    margin-top: 60px; background: var(--ink); border-radius: 30px; padding: 54px; color: #fff;
    display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; overflow: hidden; position: relative;
  }
  .meds-v2 .mini-quiz::before {
    content: ""; position: absolute; width: 420px; height: 420px; border-radius: 50%;
    background: radial-gradient(circle, rgba(184,35,92,.40), transparent 70%);
    right: -130px; top: -130px; animation: breathe 8s ease-in-out infinite; will-change: transform;
  }
  .meds-v2 .mini-quiz h3 { font-family: 'Newsreader', Georgia, serif; font-weight: 500; font-size: clamp(28px, 3.2vw, 42px); position: relative; margin: 0; }
  .meds-v2 .mini-quiz h3 em { font-style: italic; color: var(--pink-3); }
  .meds-v2 .mini-quiz p { font-family: 'DM Sans', sans-serif; color: rgba(255,255,255,.75); margin-top: 12px; font-size: 15.5px; position: relative; }
  .meds-v2 .q-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; position: relative; }
  .meds-v2 .q-opt {
    font-family: 'DM Sans', sans-serif; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.16);
    border-radius: 16px; padding: 18px 20px; color: #fff; text-decoration: none; font-weight: 600; font-size: 15px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    transition: background .25s ease, transform .25s ease, border-color .25s ease;
  }
  @media (hover: hover) and (pointer: fine) {
    .meds-v2 .q-opt:hover { background: var(--pink); border-color: var(--pink); transform: translateY(-3px); }
  }

  /* ═══ SECTION 3 — SCIENCE / ESTRADIOL CURVE (ported, brand-skinned) ═══ */
  .science-v2 { background: linear-gradient(180deg, var(--pink-soft) 0%, var(--pink-softer) 60%, #fff 100%); padding: 120px 0; }
  @media (max-width: 760px) { .science-v2 { padding: 72px 0; } }
  .science-v2 .curve-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
  .science-v2 .curve-card { background: var(--paper); border: 1px solid var(--line); border-radius: 28px; padding: 38px; box-shadow: 0 26px 64px rgba(26,18,22,0.07); }
  .science-v2 .curve-card svg { width: 100%; height: auto; }
  /* Line-draw on load — base = fully drawn (offset 0), so it's never stuck hidden;
     animation draws it in for motion-OK users. forwards only (no backwards hold). */
  @media (prefers-reduced-motion: no-preference) {
    @keyframes drawLine { from { stroke-dashoffset: var(--dash, 1200); } to { stroke-dashoffset: 0; } }
    /* Base = fully drawn (never stuck hidden). Draw animation runs only once
       the section scrolls into view (.sci-go added by IntersectionObserver). */
    .science-v2 #declineLine { stroke-dasharray: 1200; }
    .science-v2 #liftLine { stroke-dasharray: 620; --dash: 620; }
    .science-v2.sci-go #declineLine { animation: drawLine 2.2s cubic-bezier(.4,0,.2,1) forwards; }
    .science-v2.sci-go #liftLine { animation: drawLine 1.6s cubic-bezier(.4,0,.2,1) 1.1s forwards; }
  }
  .science-v2 .curve-note { font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--muted); margin-top: 14px; }
  .science-v2 .stat-band { display: flex; gap: 48px; margin-top: 40px; flex-wrap: wrap; }
  .science-v2 .stat b { font-family: 'Newsreader', Georgia, serif; font-weight: 500; font-size: 50px; color: var(--pink-deep); display: block; line-height: 1; }
  .science-v2 .stat small { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink-2); }

  /* ═══ SECTION 4 — FINAL CTA (ported, brand-skinned, our approved copy) ═══ */
  .final-v2 { padding: 110px 0; text-align: center; position: relative; overflow: hidden; background: var(--paper); }
  .final-v2::before {
    content: ""; position: absolute; left: 50%; top: -120px; transform: translateX(-50%);
    width: 620px; height: 620px; border-radius: 50%;
    background: radial-gradient(circle, var(--pink-soft), transparent 68%);
    z-index: 0; pointer-events: none;
  }
  .final-v2 .final-inner { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 0 24px; }
  .final-v2 .eyebrow { display: inline-block; margin-bottom: 18px; }
  .final-v2 h2 { font-family: 'Newsreader', Georgia, serif; font-weight: 500; font-size: clamp(40px, 5.6vw, 76px); line-height: 1.04; letter-spacing: -0.02em; color: var(--ink); margin: 0; }
  .final-v2 h2 em { font-style: italic; color: var(--pink); }
  .final-v2 p { font-family: 'DM Sans', sans-serif; color: var(--ink-2); margin: 20px auto 34px; max-width: 500px; font-size: 17px; line-height: 1.55; }

  /* Responsive for ported sections */
  @media (max-width: 900px) {
    .meds-v2 .med-row { grid-template-columns: repeat(2, 1fr); }
    .meds-v2 .mini-quiz { grid-template-columns: 1fr; padding: 38px; gap: 28px; }
    .science-v2 .curve-grid { grid-template-columns: 1fr; gap: 36px; }
  }
  @media (max-width: 560px) {
    .meds-v2 .med-row { grid-template-columns: 1fr 1fr; gap: 10px; }
    .meds-v2 .q-options { grid-template-columns: 1fr; }
    .science-v2 .stat-band { gap: 28px; }
  }

  /* ═══ CLINICAL EXCELLENCE (ported from reference, brand-skinned) ═══ */
  .clinical-v2 { background: var(--paper); }
  .clinical-v2 .eyebrow-chip {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase;
    color: var(--pink-deep); background: var(--pink-soft);
    border-radius: 100px; padding: 8px 16px; margin-bottom: 20px;
  }
  .clinical-v2 .v2-title {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(32px, 4.2vw, 54px); line-height: 1.06; letter-spacing: -0.02em;
    color: var(--ink); margin: 0 0 40px;
  }
  .clinical-v2 .v2-title em { font-style: italic; color: var(--pink); }
  .clinical-v2 .standards-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 48px; align-items: start; }
  .clinical-v2 .cred-list { display: flex; flex-direction: column; gap: 14px; }
  .clinical-v2 .cred {
    display: flex; gap: 16px; align-items: flex-start;
    background: var(--pink-softer); border: 1px solid var(--line); border-radius: 18px; padding: 22px;
    transition: transform .3s ease, box-shadow .3s ease;
  }
  @media (hover: hover) and (pointer: fine) {
    .clinical-v2 .cred:hover { transform: translateX(6px); box-shadow: 0 14px 36px rgba(26,18,22,.08); }
  }
  .clinical-v2 .cred .ic {
    flex: 0 0 44px; width: 44px; height: 44px; border-radius: 12px;
    background: var(--pink-soft); color: var(--pink-deep);
    display: flex; align-items: center; justify-content: center;
  }
  .clinical-v2 .cred h4 { font-family: 'DM Sans', system-ui, sans-serif; font-size: 17px; font-weight: 700; margin: 0 0 3px; color: var(--ink); }
  .clinical-v2 .cred p { font-family: 'DM Sans', system-ui, sans-serif; font-size: 14px; color: var(--muted); margin: 0; line-height: 1.55; }
  .clinical-v2 .clinical-panel {
    background: var(--ink); color: #fff; border-radius: 24px; padding: 40px;
    position: relative; overflow: hidden; align-self: stretch;
  }
  .clinical-v2 .clinical-panel::before {
    content: ""; position: absolute; width: 360px; height: 360px; border-radius: 50%;
    background: radial-gradient(circle, rgba(184,35,92,.40), transparent 70%);
    right: -120px; bottom: -120px; animation: breathe 8s ease-in-out infinite; will-change: transform;
  }
  .clinical-v2 .clinical-panel .role {
    font-family: 'DM Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: .14em;

<script>
  // Editorial nav: transparent at top, white-blur background once scrolled
  (function() {
    var nav = document.querySelector('.nav.nav-editorial');
    if (!nav) return;
    var update = function() {
      if (window.scrollY > 24) nav.classList.add('scrolled');
      else nav.classList.remove('scrolled');
    };
    window.addEventListener('scroll', update, { passive: true });
    update();
  })();

  // Products scroll container: click-and-drag to scroll on desktop.
  (function() {
    function init() {
      var el = document.querySelector('.products-scroll-container');
      if (!el) { return setTimeout(init, 200); }
      var isDown = false, startX = 0, scrollLeft = 0;
      el.addEventListener('mousedown', function(e) {
        isDown = true; el.classList.add('dragging');
        startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; e.preventDefault();
      });
      ['mouseleave', 'mouseup'].forEach(function(evt) {
        el.addEventListener(evt, function() { isDown = false; el.classList.remove('dragging'); });
      });
      el.addEventListener('mousemove', function(e) {
        if (!isDown) return; e.preventDefault();
        var x = e.pageX - el.offsetLeft; el.scrollLeft = scrollLeft - (x - startX) * 1.4;
      });
    }
    init();
  })();

  // Science section: draw the curve + count the stats up when scrolled into view.
  // Bulletproof — stat spans default to their final value in the HTML, so if
  // this never runs (no JS / reduced motion / hidden tab) the numbers still show.
  (function () {
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var tries = 0;
    function go() {
      var sec = document.querySelector('#root .science-v2');
      if (!sec && tries < 240) { tries++; return requestAnimationFrame(go); }
      if (!sec) return;
      var nums = sec.querySelectorAll('[data-count]');
      function run() {
        sec.classList.add('sci-go');
        if (reduce) return; // leave final numbers as-is
        nums.forEach(function (el) {
          var target = parseFloat(el.getAttribute('data-count')) || 0;
          var dur = 1400, start = null;
          function tick(ts) {
            if (start === null) start = ts;
            var p = Math.min((ts - start) / dur, 1);
            var eased = 1 - Math.pow(1 - p, 3);
            el.textContent = Math.round(eased * target);
            if (p < 1) requestAnimationFrame(tick);
            else el.textContent = target;
          }
          requestAnimationFrame(tick);
        });
      }
      if (reduce || !('IntersectionObserver' in window)) { run(); return; }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) { if (e.isIntersecting) { run(); io.disconnect(); } });
      }, { threshold: 0.3 });
      io.observe(sec);
      setTimeout(function () { if (!sec.classList.contains('sci-go')) run(); }, 4000);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', go);
    else go();
  })();

  // "Why Her Estrogen" icons: flip in when the grid scrolls into view.
  // Bulletproof — icons display normally if this never runs.
  (function () {
    var tries = 0;
    function go() {
      var grid = document.querySelector('#root .edu-why-grid');
      if (!grid && tries < 240) { tries++; return requestAnimationFrame(go); }
      if (!grid) return;
      if (!('IntersectionObserver' in window)) { grid.classList.add('flip-go'); return; }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) { if (e.isIntersecting) { grid.classList.add('flip-go'); io.disconnect(); } });
      }, { threshold: 0.35 });
      io.observe(grid);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', go);
    else go();
  })();
</script>
