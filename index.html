<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>HerEstrogen — Women's Hormone Care</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=3" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png?v=3" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png?v=3" />
<link rel="shortcut icon" href="assets/favicon-32.png?v=3" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=DM+Sans:opsz,wght@9..40,300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #b8235c;
    --pink-2: #d04a7e;
    --pink-3: #ec84a8;
    --pink-soft: #fde8ef;
    --pink-softer: #fef5f8;
    --pink-deep: #8a1745;
    --paper: #ffffff;
    --ink: #1a1216;
    --ink-2: #3d2b33;
    --muted: #7a6770;
    --line: #f0d9e2;
    --line-2: #e8c5d2;
    --moss: #5a6b4a;
    --gold: #b89455;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: clip; max-width: 100%; }
  /* Global responsive defaults — prevents images busting out of containers on resize */
  img { max-width: 100%; height: auto; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: 'Newsreader', Georgia, serif; }
  .mono { font-family: 'DM Mono', ui-monospace, monospace; }
  .container { max-width: 1240px; margin: 0 auto; padding: 0 32px; }
  .narrow { max-width: 980px; margin: 0 auto; padding: 0 32px; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }

  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px; border-radius: 999px;
    font-size: 15px; font-weight: 500;
    transition: transform .15s ease, background .2s ease, color .2s ease, box-shadow .2s ease;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--pink); color: #fff;
    box-shadow: 0 4px 18px rgba(184,35,92,.22);
  }
  .btn-primary:hover { background: var(--pink-deep); box-shadow: 0 6px 22px rgba(184,35,92,.32); }
  .btn-ghost { background: transparent; color: var(--pink-deep); border: 1px solid var(--pink); }
  .btn-ghost:hover { background: var(--pink); color: #fff; }
  .btn-soft { background: var(--pink-soft); color: var(--pink-deep); }
  .btn-soft:hover { background: var(--pink-3); color: #fff; }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--pink);
  }

  /* placeholder image */
  .ph {
    background:
      repeating-linear-gradient(135deg, rgba(184,35,92,.08) 0 1px, transparent 1px 14px),
      linear-gradient(135deg, var(--pink-softer) 0%, var(--pink-soft) 100%);
    display: flex; align-items: center; justify-content: center;
    color: var(--pink-deep);
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase;
    border-radius: 4px;
    text-align: center;
  }
  .ph.dark {
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,.1) 0 1px, transparent 1px 14px),
      linear-gradient(135deg, var(--pink-deep) 0%, var(--pink) 100%);
    color: rgba(255,255,255,.7);
  }

  /* ---- NAV ---- */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 32px;
    max-width: 1240px; margin: 0 auto;
  }
  .logo { display: flex; align-items: center; flex-shrink: 0; }
  .logo img { height: 34px; width: auto; display: block; }
  .nav-links { display: flex; gap: 28px; font-size: 14px; }
  .nav-links a { color: var(--ink-2); font-weight: 500; }
  .nav-links a:hover { color: var(--pink); }
  .nav-cta { display: flex; gap: 12px; align-items: center; }
  @media (max-width: 1000px) { .nav-links { display: none; } }

  /* ---- HERO ---- */
  .hero {
    padding: 56px 0 80px;
    position: relative; overflow: hidden;
    background:
      radial-gradient(900px 600px at 90% 10%, var(--pink-soft) 0%, transparent 60%),
      radial-gradient(700px 500px at 0% 90%, var(--pink-softer) 0%, transparent 60%),
      var(--paper);
  }
  .hero-grid {
    display: grid; grid-template-columns: 1.05fr .95fr; gap: 64px;
    align-items: center;
  }
  @media (max-width: 920px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }
  .hero h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(44px, 6.2vw, 84px);
    line-height: 1.02;
    letter-spacing: -0.025em;
    margin: 18px 0 22px;
    color: var(--ink);
  }
  .hero h1 em { font-style: italic; color: var(--pink); font-weight: 500; }
  .hero-sub {
    font-size: 18px; line-height: 1.55;
    color: var(--ink-2);
    max-width: 480px; margin-bottom: 32px;
  }
  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 36px; }
  .hero-meta {
    display: flex; gap: 28px; flex-wrap: wrap;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 13px; color: var(--muted);
  }
  .hero-meta div { display: flex; align-items: center; gap: 8px; }
  .check {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--pink); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px;
  }
  .hero-art {
    position: relative;
    aspect-ratio: 4/5;
    border-radius: 8px;
    overflow: hidden;
  }
  .hero-art .ph { width: 100%; height: 100%; border-radius: 8px; font-size: 12px; }
  .hero-art .photo { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; display: block; }
  .hero-art .tag {
    position: absolute; bottom: 24px; left: 24px; right: 24px;
    background: #fff;
    padding: 16px 18px;
    border-radius: 6px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 12px 40px rgba(138,23,69,.14);
  }
  .tag-num {
    font-family: 'Newsreader', Georgia, serif; font-size: 38px;
    color: var(--pink); line-height: 1; font-weight: 500;
    font-style: italic;
  }
  .tag-text { font-size: 12px; color: var(--ink-2); line-height: 1.4; }

  /* press strip */
  .press {
    padding: 28px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: #fff;
  }
  .press-inner {
    display: flex; align-items: center; gap: 48px;
    justify-content: space-between; flex-wrap: wrap;
  }
  .press-label {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
  }
  .press-logos { display: flex; gap: 44px; flex-wrap: wrap; align-items: center; }
  .press-logo {
    font-family: 'Newsreader', Georgia, serif; font-size: 18px;
    color: var(--ink-2); opacity: .55; letter-spacing: -0.01em;
  }
  .press-logo.bold { font-weight: 700; font-family: 'DM Sans', sans-serif; letter-spacing: -0.02em; font-size: 16px; }
  .press-logo.upper { text-transform: uppercase; letter-spacing: 0.18em; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 600; }

  /* ---- SYMPTOMS QUIZ ---- */
  .quiz {
    padding: 96px 0;
    background:
      radial-gradient(800px 500px at 100% 0%, var(--pink-soft) 0%, transparent 55%),
      var(--pink-softer);
  }
  .quiz-head {
    display: grid; grid-template-columns: 1fr 1fr; gap: 64px;
    margin-bottom: 48px; align-items: end;
  }
  @media (max-width: 800px) { .quiz-head { grid-template-columns: 1fr; gap: 24px; } }
  .quiz h2 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(34px, 4.4vw, 56px);
    line-height: 1.05; letter-spacing: -0.02em; margin: 12px 0 0;
  }
  .quiz h2 em { font-style: italic; color: var(--pink); }
  .quiz-intro { color: var(--ink-2); font-size: 17px; max-width: 440px; }
  .symptom-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  }
  @media (max-width: 900px) { .symptom-grid { grid-template-columns: repeat(2, 1fr); } }
  .symptom {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px 18px 16px;
    cursor: pointer;
    transition: all .15s ease;
    display: flex; flex-direction: column;
    gap: 10px;
    min-height: 110px;
    text-align: left;
    position: relative;
  }
  .symptom:hover { border-color: var(--pink-3); box-shadow: 0 4px 14px rgba(184,35,92,.06); }
  .symptom.active {
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-deep) 100%);
    color: #fff;
    border-color: var(--pink);
    box-shadow: 0 6px 20px rgba(184,35,92,.25);
  }
  .symptom-glyph {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--pink-soft);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Newsreader', Georgia, serif; font-style: italic;
    font-size: 13px; color: var(--pink-deep);
  }
  .symptom.active .symptom-glyph { background: rgba(255,255,255,.22); color: #fff; }
  .symptom-name { font-size: 14px; font-weight: 600; line-height: 1.25; }
  .symptom-note { font-size: 12px; color: var(--muted); }
  .symptom.active .symptom-note { color: rgba(255,255,255,.78); }
  .quiz-action {
    margin-top: 32px;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .quiz-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.05em;
  }
  .quiz-count strong { color: var(--pink-deep); font-weight: 600; }

  /* ---- SCIENCE / WHAT IS HRT ---- */
  .science {
    padding: 120px 0;
    background: #fff;
  }
  .science-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
    align-items: start;
  }
  @media (max-width: 880px) { .science-grid { grid-template-columns: 1fr; gap: 40px; } }
  .science h2 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(36px, 4.6vw, 60px); line-height: 1.05;
    letter-spacing: -0.022em; margin: 12px 0 24px;
  }
  .science h2 em { font-style: italic; color: var(--pink); }
  .science-body { font-size: 17px; line-height: 1.6; color: var(--ink-2); }
  .science-body p + p { margin-top: 18px; }
  .science-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    border-top: 1px solid var(--line);
    border-left: 1px solid var(--line);
    margin-top: 32px;
  }
  .stat {
    padding: 24px 20px;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: var(--pink-softer);
  }
  .stat-num {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: 44px; line-height: 1; color: var(--pink);
    letter-spacing: -0.02em; font-style: italic;
  }
  .stat-label { font-size: 12px; color: var(--ink-2); margin-top: 8px; line-height: 1.4; }
  .science-art .photo {
    width: 100%; aspect-ratio: 1/1.15; object-fit: cover;
    border-radius: 8px; display: block;
    box-shadow: 0 30px 60px -20px rgba(184,35,92,.22);
  }
  .science-art .ph {
    aspect-ratio: 1/1.15;
    border-radius: 8px;
    font-size: 12px;
  }

  /* ---- HOW IT WORKS ---- */
  .how {
    padding: 120px 0 140px;
    background: #fff;
    color: var(--ink);
  }
  .how-head { max-width: 720px; margin: 0 auto 72px; }
  .how h2 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(36px, 4.8vw, 64px); line-height: 1.04;
    letter-spacing: -0.022em; margin: 12px 0 20px;
  }
  .how h2 em { font-style: italic; color: var(--pink); }
  .how-intro {
    font-size: 17px; color: var(--ink-2); line-height: 1.55; max-width: 540px;
  }
  .how-intro strong { color: var(--pink); font-weight: 600; }

  /* timeline */
  .timeline {
    position: relative;
    max-width: 1080px; margin: 0 auto;
  }
  .timeline-rail {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%; transform: translateX(-50%);
    width: 22px;
    pointer-events: none;
  }
  @media (max-width: 760px) {
    .timeline-rail { left: 22px; transform: none; }
  }
  .rail-track {
    position: absolute; top: 0; bottom: 0; left: 50%;
    width: 2px; transform: translateX(-50%);
    background: var(--line);
  }
  .rail-fill {
    position: absolute; top: 0; left: 50%;
    width: 2px; transform: translateX(-50%);
    background: linear-gradient(180deg, var(--pink) 0%, var(--pink-deep) 100%);
    transition: height .45s cubic-bezier(.22,1,.36,1);
    height: 0;
    will-change: height;
  }
  .rail-node {
    position: absolute;
    left: 50%; transform: translate(-50%, -50%);
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; border: 2px solid var(--line);
    z-index: 2;
    transition: background .6s cubic-bezier(.22,1,.36,1),
                border-color .6s cubic-bezier(.22,1,.36,1),
                box-shadow .6s cubic-bezier(.22,1,.36,1),
                transform .6s cubic-bezier(.22,1,.36,1);
    will-change: transform, box-shadow;
  }
  .rail-node::after {
    content: '';
    position: absolute; inset: 4px; border-radius: 50%;
    background: var(--line);
    transition: background .6s cubic-bezier(.22,1,.36,1);
  }
  .rail-node.active {
    border-color: var(--pink);
    background: var(--pink-soft);
    box-shadow: 0 0 0 8px rgba(184,35,92,.14);
    transform: translate(-50%, -50%) scale(1.05);
  }
  .rail-node.active::after { background: var(--pink); }

  .step-rows { display: flex; flex-direction: column; gap: 0; }
  .step-row {
    display: grid;
    grid-template-columns: 1fr 80px 1fr;
    align-items: start;
    padding-bottom: 96px;
  }
  .step-row:last-child { padding-bottom: 0; }
  @media (max-width: 760px) {
    .step-row { grid-template-columns: 56px 1fr; padding-bottom: 64px; }
  }
  .step-card {
    opacity: 0;
    transform: translateY(32px);
    transition: opacity 1s cubic-bezier(.22,1,.36,1),
                transform 1s cubic-bezier(.22,1,.36,1);
    will-change: opacity, transform;
  }
  .step-card.in { opacity: 1; transform: translateY(0); }
  .step-card .step-num {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--pink); letter-spacing: 0.14em; text-transform: uppercase;
  }
  .step-card h3 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(28px, 3.2vw, 40px); line-height: 1.05;
    letter-spacing: -0.018em; margin: 14px 0 14px;
  }
  .step-card p {
    font-size: 16px; line-height: 1.6; color: var(--ink-2);
    max-width: 440px; margin: 0 0 24px;
  }
  .step-row.right .step-card { grid-column: 3 / 4; padding-left: 8px; }
  .step-row.left .step-card { grid-column: 1 / 2; padding-right: 8px; text-align: right; }
  .step-row.left .step-card p { margin-left: auto; }
  @media (max-width: 760px) {
    .step-row.left .step-card, .step-row.right .step-card {
      grid-column: 2 / 3;
      text-align: left;
      padding: 0;
    }
    .step-row.left .step-card p { margin-left: 0; }
  }
  .step-image {
    aspect-ratio: 4/3;
    border-radius: 12px;
    overflow: hidden;
    margin-top: 4px;
    max-width: 460px;
  }
  .step-row.left .step-image { margin-left: auto; }
  @media (max-width: 760px) {
    .step-row.left .step-image { margin-left: 0; }
  }
  .step-image .ph { width: 100%; height: 100%; border-radius: 12px; font-size: 11px; }
  .step-image .photo { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; display: block; }
  .step-meta {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase;
    margin-top: 14px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .step-meta::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--pink);
  }

  /* ---- TREATMENTS / PRODUCT ---- */
  .treatments { padding: 96px 0 80px; background: #fff; }

  /* Two-column header (40 / 60 split) */
  .treatments-two-col {
    display: grid;
    grid-template-columns: 40% 60%;
    gap: 60px;
    align-items: end;
    margin-bottom: 48px;
  }
  .treatments-col-left h2 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(36px, 4.6vw, 60px);
    line-height: 1.02;
    letter-spacing: -0.022em;
    margin: 12px 0 0;
    text-align: left;
  }
  .treatments-col-left h2 em { font-style: italic; color: var(--pink); }
  .treatments-col-right {
    padding-bottom: 8px;
  }
  .treatments-sub {
    color: var(--ink-2);
    font-size: 17px;
    line-height: 1.55;
    margin: 0;
    text-align: left;
    max-width: 560px;
  }
  .treatments-highlight {
    color: var(--pink);
    font-weight: 600;
  }
  @media (max-width: 880px) {
    .treatments { padding: 56px 0 48px; }
    .treatments-two-col {
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    .treatments-col-right { padding-bottom: 0; }
    .treatments-sub { font-size: 15.5px; max-width: 100%; }
  }

  /* Scroll wrapper (anchors the desktop arrow buttons) */
  .products-scroll-wrapper {
    position: relative;
  }

  /* Desktop scroll arrows */
  .products-scroll-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--pink);
    color: var(--pink);
    font-family: 'Newsreader', Georgia, serif;
    font-size: 34px;
    font-weight: 600;
    line-height: 0;
    padding-bottom: 4px;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 8px 20px rgba(184, 35, 92, 0.22), 0 0 0 4px rgba(184, 35, 92, 0.08);
    transition: background .15s ease, color .15s ease, transform .15s ease, box-shadow .15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .products-scroll-arrow:hover {
    background: var(--pink);
    color: #fff;
    transform: translateY(-50%) scale(1.06);
    box-shadow: 0 14px 32px rgba(184, 35, 92, 0.40), 0 0 0 6px rgba(184, 35, 92, 0.14);
  }
  .products-scroll-arrow-left  { left: 16px; }
  .products-scroll-arrow-right { right: 16px; }

  /* Hide arrows on mobile — touch scroll only */
  @media (max-width: 880px) {
    .products-scroll-arrow { display: none; }
  }

  /* Horizontal scroll container */
  .products-scroll-container {
    display: flex;
    flex-direction: row;
    gap: 20px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 24px 60px 50px 60px;
    cursor: grab;
  }
  .products-scroll-container::-webkit-scrollbar { display: none; }
  .products-scroll-container:active { cursor: grabbing; }

  /* Individual card — fully transparent so PNG white backgrounds blend
     invisibly into the section's white #fff background. No border, no
     visible card shape; the product image floats in the row. */
  .product-card-new {
    scroll-snap-align: start;
    flex-shrink: 0;
    width: 432px;
    position: relative;
    overflow: visible;
    background: transparent;
    border: 0;
    border-radius: 20px;
    box-shadow: none;
    transition: transform .25s ease;
    /* Whole card is a clickable link */
    display: block;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .product-card-new:hover {
    transform: translateY(-4px);
  }
  /* When ANY part of the card is hovered (including the image),
     light up the Get Started button. */
  .product-card-new:hover .product-card-btn {
    background: var(--pink);
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(184, 35, 92, 0.28);
  }

  /* Image area — fixed-size square render box so every product (tube,
     bottle, patch) scales to fit the SAME area via object-fit: contain.
     mix-blend-mode: multiply drops white PNG backgrounds against the
     section's white background. */
  .product-card-image-wrapper {
    position: relative;
    width: 384px;
    height: 384px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }
  .product-card-image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: transparent;
    mix-blend-mode: multiply;
    filter: drop-shadow(0 14px 26px rgba(138, 23, 69, 0.14));
  }
  /* Patch PNG has a solid white background (no real alpha channel), so the
     drop-shadow draws a rectangle around the full image bounding box —
     creating a visible border artifact. Suppress the shadow for that image
     and disable multiply blend (white-bg image becomes invisible under
     multiply). The wrapper background stays transparent so the sticker
     PNG's own alpha shows through naturally (per request). */
  .product-card-image-wrapper img.no-shadow {
    filter: none;
    mix-blend-mode: normal;
  }

    font-weight: 700;
    letter-spacing: 0.08em;

  /* Use-case tag — surfaces below the clinical subtitle on selected
     product cards (Comfort Cream + Nightly Balance Pill). Pink-deep, 12px,

     competing with the product name. */
  .product-use-case {

  .product-card-btn {

    padding: 14px 20px;

  /* ---- TESTIMONIALS ---- */
  /* Hidden: no verified patient testimonials yet.
     Only real, consented patient stories go here.

  .reviews, .reviews-rating, .review-grid, .review { display: none !important; }

  /* ---- BUNDLE SECTION (The Complete Protocol) ---- */
