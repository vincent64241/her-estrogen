<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Her Estrogen — Women's Hormone Care</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=3" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png?v=3" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png?v=3" />
<link rel="shortcut icon" href="assets/favicon-32.png?v=3" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=DM+Sans:opsz,wght@9..40,300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #b8235c;
    --pink-2: #d04a7e;
    --pink-3: #ec84a8;
    --pink-soft: #fde8ef;
    --pink-softer: #fef5f8;
    --pink-deep: #8a1745;
    --paper: #ffffff;
    --ink: #1a1216;
    --ink-2: #3d2b33;
    --muted: #7a6770;
    --line: #f0d9e2;
    --line-2: #e8c5d2;
    --moss: #5a6b4a;
    --gold: #b89455;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; max-width: 100%; }
  /* Global responsive defaults — prevents images busting out of containers on resize */
  img { max-width: 100%; height: auto; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: 'Newsreader', Georgia, serif; }
  .mono { font-family: 'DM Mono', ui-monospace, monospace; }
  .container { max-width: 1240px; margin: 0 auto; padding: 0 32px; }
  .narrow { max-width: 980px; margin: 0 auto; padding: 0 32px; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }

  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px; border-radius: 999px;
    font-size: 15px; font-weight: 500;
    transition: transform .15s ease, background .2s ease, color .2s ease, box-shadow .2s ease;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--pink); color: #fff;
    box-shadow: 0 4px 18px rgba(184,35,92,.22);
  }
  .btn-primary:hover { background: var(--pink-deep); box-shadow: 0 6px 22px rgba(184,35,92,.32); }
  .btn-ghost { background: transparent; color: var(--pink-deep); border: 1px solid var(--pink); }
  .btn-ghost:hover { background: var(--pink); color: #fff; }
  .btn-soft { background: var(--pink-soft); color: var(--pink-deep); }
  .btn-soft:hover { background: var(--pink-3); color: #fff; }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--pink);
  }

  /* placeholder image */
  .ph {
    background:
      repeating-linear-gradient(135deg, rgba(184,35,92,.08) 0 1px, transparent 1px 14px),
      linear-gradient(135deg, var(--pink-softer) 0%, var(--pink-soft) 100%);
    display: flex; align-items: center; justify-content: center;
    color: var(--pink-deep);
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase;
    border-radius: 4px;
    text-align: center;
  }
  .ph.dark {
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,.1) 0 1px, transparent 1px 14px),
      linear-gradient(135deg, var(--pink-deep) 0%, var(--pink) 100%);
    color: rgba(255,255,255,.7);
  }

  /* ---- NAV ---- */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 32px;
    max-width: 1240px; margin: 0 auto;
  }
  .logo { display: flex; align-items: center; flex-shrink: 0; }
  .logo img { height: 34px; width: auto; display: block; }
  .nav-links { display: flex; gap: 28px; font-size: 14px; }
  .nav-links a { color: var(--ink-2); font-weight: 500; }
  .nav-links a:hover { color: var(--pink); }
  .nav-cta { display: flex; gap: 12px; align-items: center; }
  @media (max-width: 1000px) { .nav-links { display: none; } }

  /* ---- HERO ---- */
  .hero {
    padding: 56px 0 80px;
    position: relative; overflow: hidden;
    background:
      radial-gradient(900px 600px at 90% 10%, var(--pink-soft) 0%, transparent 60%),
      radial-gradient(700px 500px at 0% 90%, var(--pink-softer) 0%, transparent 60%),
      var(--paper);
  }
  .hero-grid {
    display: grid; grid-template-columns: 1.05fr .95fr; gap: 64px;
    align-items: center;
  }
  @media (max-width: 920px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }
  .hero h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(44px, 6.2vw, 84px);
    line-height: 1.02;
    letter-spacing: -0.025em;
    margin: 18px 0 22px;
    color: var(--ink);
  }
  .hero h1 em { font-style: italic; color: var(--pink); font-weight: 500; }
  .hero-sub {
    font-size: 18px; line-height: 1.55;
    color: var(--ink-2);
    max-width: 480px; margin-bottom: 32px;
  }
  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 36px; }
  .hero-meta {
    display: flex; gap: 28px; flex-wrap: wrap;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 13px; color: var(--muted);
  }
  .hero-meta div { display: flex; align-items: center; gap: 8px; }
  .check {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--pink); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px;
  }
  .hero-art {
    position: relative;
    aspect-ratio: 4/5;
    border-radius: 8px;
    overflow: hidden;
  }
  .hero-art .ph { width: 100%; height: 100%; border-radius: 8px; font-size: 12px; }
  .hero-art .photo { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; display: block; }
  .hero-art .tag {
    position: absolute; bottom: 24px; left: 24px; right: 24px;
    background: #fff;
    padding: 16px 18px;
    border-radius: 6px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 12px 40px rgba(138,23,69,.14);
  }
  .tag-num {
    font-family: 'Newsreader', Georgia, serif; font-size: 38px;
    color: var(--pink); line-height: 1; font-weight: 500;
    font-style: italic;
  }
  .tag-text { font-size: 12px; color: var(--ink-2); line-height: 1.4; }

  /* press strip */
  .press {
    padding: 28px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: #fff;
  }
  .press-inner {
    display: flex; align-items: center; gap: 48px;
    justify-content: space-between; flex-wrap: wrap;
  }
  .press-label {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
  }
  .press-logos { display: flex; gap: 44px; flex-wrap: wrap; align-items: center; }
  .press-logo {
    font-family: 'Newsreader', Georgia, serif; font-size: 18px;
    color: var(--ink-2); opacity: .55; letter-spacing: -0.01em;
  }
  .press-logo.bold { font-weight: 700; font-family: 'DM Sans', sans-serif; letter-spacing: -0.02em; font-size: 16px; }
  .press-logo.upper { text-transform: uppercase; letter-spacing: 0.18em; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 600; }

  /* ---- SYMPTOMS QUIZ ---- */
  .quiz {
    padding: 96px 0;
    background:
      radial-gradient(800px 500px at 100% 0%, var(--pink-soft) 0%, transparent 55%),
      var(--pink-softer);
  }
  .quiz-head {
    display: grid; grid-template-columns: 1fr 1fr; gap: 64px;
    margin-bottom: 48px; align-items: end;
  }
  @media (max-width: 800px) { .quiz-head { grid-template-columns: 1fr; gap: 24px; } }
  .quiz h2 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(34px, 4.4vw, 56px);
    line-height: 1.05; letter-spacing: -0.02em; margin: 12px 0 0;
  }
  .quiz h2 em { font-style: italic; color: var(--pink); }
  .quiz-intro { color: var(--ink-2); font-size: 17px; max-width: 440px; }
  .symptom-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  }
  @media (max-width: 900px) { .symptom-grid { grid-template-columns: repeat(2, 1fr); } }
  .symptom {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px 18px 16px;
    cursor: pointer;
    transition: all .15s ease;
    display: flex; flex-direction: column;
    gap: 10px;
    min-height: 110px;
    text-align: left;
    position: relative;
  }
  .symptom:hover { border-color: var(--pink-3); box-shadow: 0 4px 14px rgba(184,35,92,.06); }
  .symptom.active {
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-deep) 100%);
    color: #fff;
    border-color: var(--pink);
    box-shadow: 0 6px 20px rgba(184,35,92,.25);
  }
  .symptom-glyph {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--pink-soft);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Newsreader', Georgia, serif; font-style: italic;
    font-size: 13px; color: var(--pink-deep);
  }
  .symptom.active .symptom-glyph { background: rgba(255,255,255,.22); color: #fff; }
  .symptom-name { font-size: 14px; font-weight: 600; line-height: 1.25; }
  .symptom-note { font-size: 12px; color: var(--muted); }
  .symptom.active .symptom-note { color: rgba(255,255,255,.78); }
  .quiz-action {
    margin-top: 32px;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .quiz-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.05em;
  }
  .quiz-count strong { color: var(--pink-deep); font-weight: 600; }

  /* ---- SCIENCE / WHAT IS HRT ---- */
  .science {
    padding: 120px 0;
    background: #fff;
  }
  .science-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
    align-items: start;
  }
  @media (max-width: 880px) { .science-grid { grid-template-columns: 1fr; gap: 40px; } }
  .science h2 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(36px, 4.6vw, 60px); line-height: 1.05;
    letter-spacing: -0.022em; margin: 12px 0 24px;
  }
  .science h2 em { font-style: italic; color: var(--pink); }
  .science-body { font-size: 17px; line-height: 1.6; color: var(--ink-2); }
  .science-body p + p { margin-top: 18px; }
  .science-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    border-top: 1px solid var(--line);
    border-left: 1px solid var(--line);
    margin-top: 32px;
  }
  .stat {
    padding: 24px 20px;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: var(--pink-softer);
  }
  .stat-num {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: 44px; line-height: 1; color: var(--pink);
    letter-spacing: -0.02em; font-style: italic;
  }
  .stat-label { font-size: 12px; color: var(--ink-2); margin-top: 8px; line-height: 1.4; }
  .science-art .photo {
    width: 100%; aspect-ratio: 1/1.15; object-fit: cover;
    border-radius: 8px; display: block;
    box-shadow: 0 30px 60px -20px rgba(184,35,92,.22);
  }
  .science-art .ph {
    aspect-ratio: 1/1.15;
    border-radius: 8px;
    font-size: 12px;
  }

  /* ---- HOW IT WORKS ---- */
  .how {
    padding: 120px 0 140px;
    background: #fff;
    color: var(--ink);
  }
  .how-head { max-width: 720px; margin: 0 auto 72px; }
  .how h2 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(36px, 4.8vw, 64px); line-height: 1.04;
    letter-spacing: -0.022em; margin: 12px 0 20px;
  }
  .how h2 em { font-style: italic; color: var(--pink); }
  .how-intro {
    font-size: 17px; color: var(--ink-2); line-height: 1.55; max-width: 540px;
  }
  .how-intro strong { color: var(--pink); font-weight: 600; }

  /* timeline */
  .timeline {
    position: relative;
    max-width: 1080px; margin: 0 auto;
  }
  .timeline-rail {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%; transform: translateX(-50%);
    width: 22px;
    pointer-events: none;
  }
  @media (max-width: 760px) {
    .timeline-rail { left: 22px; transform: none; }
  }
  .rail-track {
    position: absolute; top: 0; bottom: 0; left: 50%;
    width: 2px; transform: translateX(-50%);
    background: var(--line);
  }
  .rail-fill {
    position: absolute; top: 0; left: 50%;
    width: 2px; transform: translateX(-50%);
    background: linear-gradient(180deg, var(--pink) 0%, var(--pink-deep) 100%);
    transition: height .45s cubic-bezier(.22,1,.36,1);
    height: 0;
    will-change: height;
  }
  .rail-node {
    position: absolute;
    left: 50%; transform: translate(-50%, -50%);
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; border: 2px solid var(--line);
    z-index: 2;
    transition: background .6s cubic-bezier(.22,1,.36,1),
                border-color .6s cubic-bezier(.22,1,.36,1),
                box-shadow .6s cubic-bezier(.22,1,.36,1),
                transform .6s cubic-bezier(.22,1,.36,1);
    will-change: transform, box-shadow;
  }
  .rail-node::after {
    content: '';
    position: absolute; inset: 4px; border-radius: 50%;
    background: var(--line);
    transition: background .6s cubic-bezier(.22,1,.36,1);
  }
  .rail-node.active {
    border-color: var(--pink);
    background: var(--pink-soft);
    box-shadow: 0 0 0 8px rgba(184,35,92,.14);
    transform: translate(-50%, -50%) scale(1.05);
  }
  .rail-node.active::after { background: var(--pink); }

  .step-rows { display: flex; flex-direction: column; gap: 0; }
  .step-row {
    display: grid;
    grid-template-columns: 1fr 80px 1fr;
    align-items: start;
    padding-bottom: 96px;
  }
  .step-row:last-child { padding-bottom: 0; }
  @media (max-width: 760px) {
    .step-row { grid-template-columns: 56px 1fr; padding-bottom: 64px; }
  }
  .step-card {
    opacity: 0;
    transform: translateY(32px);
    transition: opacity 1s cubic-bezier(.22,1,.36,1),
                transform 1s cubic-bezier(.22,1,.36,1);
    will-change: opacity, transform;
  }
  .step-card.in { opacity: 1; transform: translateY(0); }
  .step-card .step-num {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--pink); letter-spacing: 0.14em; text-transform: uppercase;
  }
  .step-card h3 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(28px, 3.2vw, 40px); line-height: 1.05;
    letter-spacing: -0.018em; margin: 14px 0 14px;
  }
  .step-card p {
    font-size: 16px; line-height: 1.6; color: var(--ink-2);
    max-width: 440px; margin: 0 0 24px;
  }
  .step-row.right .step-card { grid-column: 3 / 4; padding-left: 8px; }
  .step-row.left .step-card { grid-column: 1 / 2; padding-right: 8px; text-align: right; }
  .step-row.left .step-card p { margin-left: auto; }
  @media (max-width: 760px) {
    .step-row.left .step-card, .step-row.right .step-card {
      grid-column: 2 / 3;
      text-align: left;
      padding: 0;
    }
    .step-row.left .step-card p { margin-left: 0; }
  }
  .step-image {
    aspect-ratio: 4/3;
    border-radius: 12px;
    overflow: hidden;
    margin-top: 4px;
    max-width: 460px;
  }
  .step-row.left .step-image { margin-left: auto; }
  @media (max-width: 760px) {
    .step-row.left .step-image { margin-left: 0; }
  }
  .step-image .ph { width: 100%; height: 100%; border-radius: 12px; font-size: 11px; }
  .step-image .photo { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; display: block; }
  .step-meta {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase;
    margin-top: 14px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .step-meta::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--pink);
  }

  /* ---- TREATMENTS / PRODUCT ---- */
  .treatments { padding: 96px 0 80px; background: #fff; }

  /* Two-column header (40 / 60 split) */
  .treatments-two-col {
    display: grid;
    grid-template-columns: 40% 60%;
    gap: 60px;
    align-items: end;
    margin-bottom: 48px;
  }
  .treatments-col-left h2 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(36px, 4.6vw, 60px);
    line-height: 1.02;
    letter-spacing: -0.022em;
    margin: 12px 0 0;
    text-align: left;
  }
  .treatments-col-left h2 em { font-style: italic; color: var(--pink); }
  .treatments-col-right {
    padding-bottom: 8px;
  }
  .treatments-sub {
    color: var(--ink-2);
    font-size: 17px;
    line-height: 1.55;
    margin: 0;
    text-align: left;
    max-width: 560px;
  }
  .treatments-highlight {
    color: var(--pink);
    font-weight: 600;
  }
  @media (max-width: 880px) {
    .treatments { padding: 56px 0 48px; }
    .treatments-two-col {
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    .treatments-col-right { padding-bottom: 0; }
    .treatments-sub { font-size: 15.5px; max-width: 100%; }
  }

  /* Scroll wrapper (anchors the desktop arrow buttons) */
  .products-scroll-wrapper {
    position: relative;
  }

  /* Desktop scroll arrows */
  .products-scroll-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--pink);
    color: var(--pink);
    font-family: 'Newsreader', Georgia, serif;
    font-size: 34px;
    font-weight: 600;
    line-height: 0;
    padding-bottom: 4px;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 8px 20px rgba(184, 35, 92, 0.22), 0 0 0 4px rgba(184, 35, 92, 0.08);
    transition: background .15s ease, color .15s ease, transform .15s ease, box-shadow .15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .products-scroll-arrow:hover {
    background: var(--pink);
    color: #fff;
    transform: translateY(-50%) scale(1.06);
    box-shadow: 0 14px 32px rgba(184, 35, 92, 0.40), 0 0 0 6px rgba(184, 35, 92, 0.14);
  }
  .products-scroll-arrow-left  { left: 16px; }
  .products-scroll-arrow-right { right: 16px; }

  /* Hide arrows on mobile — touch scroll only */
  @media (max-width: 880px) {
    .products-scroll-arrow { display: none; }
  }

  /* Horizontal scroll container */
  .products-scroll-container {
    display: flex;
    flex-direction: row;
    gap: 20px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 24px 60px 50px 60px;
    cursor: grab;
  }
  .products-scroll-container::-webkit-scrollbar { display: none; }
  .products-scroll-container:active { cursor: grabbing; }

  /* Individual card — fully transparent so PNG white backgrounds blend
     invisibly into the section's white #fff background. No border, no
     visible card shape; the product image floats in the row. */
  .product-card-new {
    scroll-snap-align: start;
    flex-shrink: 0;
    width: 432px;
    position: relative;
    overflow: visible;
    background: transparent;
    border: 0;
    border-radius: 20px;
    box-shadow: none;
    transition: transform .25s ease;
    /* Whole card is a clickable link */
    display: block;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .product-card-new:hover {
    transform: translateY(-4px);
  }
  /* When ANY part of the card is hovered (including the image),
     light up the Get Started button. */
  .product-card-new:hover .product-card-btn {
    background: var(--pink);
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(184, 35, 92, 0.28);
  }

  /* Image area — fixed-size square render box so every product (tube,
     bottle, patch) scales to fit the SAME area via object-fit: contain.
     mix-blend-mode: multiply drops white PNG backgrounds against the
     section's white background. */
  .product-card-image-wrapper {
    position: relative;
    width: 384px;
    height: 384px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }
  .product-card-image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: transparent;
    mix-blend-mode: multiply;
    filter: drop-shadow(0 14px 26px rgba(138, 23, 69, 0.14));
  }
  /* Patch PNG has a solid white background (no real alpha channel), so the
     drop-shadow draws a rectangle around the full image bounding box —
     creating a visible border artifact. Suppress the shadow for that image. */
  .product-card-image-wrapper img.no-shadow {
    filter: none;
  }

  /* Content area — transparent (sits directly on white section bg). */
  .product-card-body {
    background: transparent;
    border-radius: 0;
    padding: 20px 12px 8px;
    text-align: center;
    border-top: 0;
  }
  .product-card-name {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 700;
    font-size: 24px;
    line-height: 1.1;
    letter-spacing: -0.018em;
    color: var(--ink);
    margin: 0 0 8px;
  }
  .product-card-subtitle {
    font-size: 14.5px;
    color: var(--muted);
    line-height: 1.45;
    margin: 0 0 20px;
  }
  .product-card-btn {
    display: block;
    width: 100%;
    text-align: center;
    background: var(--ink);
    color: #fff;
    padding: 14px 20px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background .15s ease, transform .15s ease;
  }
  .product-card-btn:hover {
    background: var(--pink);
    transform: translateY(-1px);
  }

  /* Mobile */
  @media (max-width: 880px) {
    .products-scroll-container {
      padding: 24px 24px 32px 24px;
      gap: 16px;
    }
    .product-card-new { width: 330px; max-width: 92vw; }
    .product-card-image-wrapper {
      width: 286px;
      height: 286px;
      max-width: 100%;
    }
    .product-card-body { padding: 16px 12px 8px; }
    .product-card-name { font-size: 22px; }
  }
  .product-tabs {
    display: flex; gap: 4px; justify-content: center;
    margin-bottom: 40px; flex-wrap: wrap;
  }
  .tab {
    padding: 10px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 600;
    background: transparent; border: 1px solid var(--line);
    color: var(--ink-2);
    transition: all .15s ease;
  }
  .tab:hover { border-color: var(--pink); color: var(--pink); }
  .tab.active {
    background: var(--pink); color: #fff; border-color: var(--pink);
    box-shadow: 0 4px 12px rgba(184,35,92,.22);
  }
  .product {
    display: grid; grid-template-columns: 1fr 1fr; gap: 64px;
    align-items: center;
    background:
      radial-gradient(600px 400px at 100% 0%, var(--pink-soft) 0%, transparent 60%),
      var(--pink-softer);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 48px;
  }
  @media (max-width: 880px) { .product { grid-template-columns: 1fr; gap: 20px; padding: 20px; } }
  @media (max-width: 760px) {
    .product { padding: 16px 20px 28px; gap: 12px; }
    .product-img { max-width: 220px; margin: 0 auto; }
    .product-img .product-svg { filter: drop-shadow(0 10px 18px rgba(184,35,92,.12)); }
    .product-img .product-svg svg,
    .product-img .product-svg img { width: 100%; height: 100%; }
    .product h3 { font-size: 28px; margin: 6px 0 10px; }
    .product-desc { font-size: 14.5px; margin-bottom: 16px; }
    .product-features { margin: 0 0 18px; }
    .product-features li { padding: 9px 0; font-size: 13.5px; }
  }
  .product-img .product-svg {
    aspect-ratio: 1/1; width: 100%;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 18px 28px rgba(184,35,92,.15));
  }
  .product-img .product-svg svg { width: 88%; height: 88%; display: block; }
  .product-img .ph {
    aspect-ratio: 1/1; border-radius: 8px; font-size: 12px;
    background:
      repeating-linear-gradient(135deg, rgba(184,35,92,.1) 0 1px, transparent 1px 14px),
      #fff;
  }
  .product .eyebrow { color: var(--pink); }
  .product h3 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: 44px; line-height: 1.05; letter-spacing: -0.02em;
    margin: 12px 0 16px;
  }
  .product-desc { font-size: 16px; color: var(--ink-2); line-height: 1.55; margin-bottom: 24px; }
  .product-features { list-style: none; padding: 0; margin: 0 0 28px; }
  .product-features li {
    display: flex; gap: 12px; padding: 12px 0;
    border-top: 1px solid var(--line);
    font-size: 14px; align-items: center;
  }
  .product-features li:last-child { border-bottom: 1px solid var(--line); }
  .feat-key { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--pink); letter-spacing: 0.08em; text-transform: uppercase; min-width: 90px; }
  .feat-val { color: var(--ink); font-weight: 500; }
  .product-price {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 24px;
  }
  .price-num { font-family: 'Newsreader', Georgia, serif; font-size: 44px; font-weight: 500; color: var(--pink-deep); font-style: italic; }
  .price-unit { color: var(--muted); font-size: 14px; }
  .price-strike { color: var(--muted); text-decoration: line-through; font-size: 16px; }

  /* ---- COMPARE ---- */
  .compare {
    padding: 110px 0;
    background: linear-gradient(160deg, var(--pink-soft) 0%, var(--pink-softer) 50%, #fff 100%);
  }
  .compare-head { text-align: center; max-width: 640px; margin: 0 auto 48px; }
  .compare h2 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(34px, 4.4vw, 54px); line-height: 1.05;
    letter-spacing: -0.022em; margin: 12px 0 16px;
  }
  .compare h2 em { font-style: italic; color: var(--pink); }
  .compare-table {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    max-width: 920px; margin: 0 auto;
    box-shadow: 0 12px 36px rgba(138,23,69,.06);
  }
  .compare-row {
    display: grid; grid-template-columns: 1.6fr 1fr 1fr;
    border-bottom: 1px solid var(--line);
  }
  .compare-row:last-child { border-bottom: none; }
  .compare-row > div { padding: 20px 24px; font-size: 14px; }
  .compare-row.header > div { font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding-top: 16px; padding-bottom: 16px; }
  .compare-row.header .col-us {
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-deep) 100%);
    color: #fff;
  }
  .col-us { background: var(--pink-softer); }
  .compare-feat { color: var(--ink); font-weight: 600; }
  .compare-yes { color: var(--pink); font-weight: 600; }
  .compare-no { color: var(--muted); }

  /* ---- TESTIMONIALS ---- */
  .reviews { padding: 120px 0; background: #fff; }
  .reviews-head { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-bottom: 48px; align-items: end; }
  @media (max-width: 800px) { .reviews-head { grid-template-columns: 1fr; } }
  .reviews h2 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(36px, 4.6vw, 60px); line-height: 1.05;
    letter-spacing: -0.022em; margin: 12px 0 0;
  }
  .reviews h2 em { font-style: italic; color: var(--pink); }
  .reviews-meta {
    text-align: right; font-size: 14px; color: var(--ink-2);
  }
  @media (max-width: 800px) { .reviews-meta { text-align: left; } }
  .reviews-rating { font-family: 'Newsreader', Georgia, serif; font-size: 48px; font-weight: 500; color: var(--pink-deep); line-height: 1; font-style: italic; }
  .reviews-rating .stars { color: var(--pink); font-size: 18px; margin-left: 6px; letter-spacing: 0.1em; font-style: normal; }
  .review-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  }
  @media (max-width: 900px) { .review-grid { grid-template-columns: 1fr; } }
  .review {
    background: linear-gradient(160deg, var(--pink-softer) 0%, #fff 80%);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 28px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .review-stars { color: var(--pink); font-size: 14px; letter-spacing: 0.15em; }
  .review-body {
    font-family: 'Newsreader', Georgia, serif; font-size: 19px;
    line-height: 1.45; color: var(--ink); font-weight: 400;
    letter-spacing: -0.005em;
    flex: 1;
  }
  .review-author {
    display: flex; align-items: center; gap: 12px;
    padding-top: 18px; border-top: 1px solid var(--line);
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--pink-soft);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Newsreader', Georgia, serif; font-style: italic;
    color: var(--pink); font-size: 16px; font-weight: 500;
  }
  .review-photo {
    width: 48px; height: 48px; border-radius: 50%;
    object-fit: cover; object-position: center top;
    border: 2px solid #fff;
    box-shadow: 0 2px 8px rgba(20, 18, 22, 0.08);
    flex-shrink: 0;
  }
  .review-name { font-size: 13px; font-weight: 600; }
  .review-age { font-size: 12px; color: var(--muted); }

  /* ---- FAQ ---- */
  .faq {
    padding: 120px 0;
    background:
      radial-gradient(800px 500px at 100% 50%, var(--pink-soft) 0%, transparent 55%),
      var(--pink-softer);
  }
  .faq-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 80px; align-items: start; }
  @media (max-width: 880px) { .faq-grid { grid-template-columns: 1fr; gap: 32px; } }
  .faq h2 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(34px, 4.4vw, 54px); line-height: 1.05;
    letter-spacing: -0.022em; margin: 12px 0 16px;
  }
  .faq h2 em { font-style: italic; color: var(--pink); }
  .faq-list { border-top: 1px solid var(--line-2); }
  .faq-item { border-bottom: 1px solid var(--line-2); }
  .faq-q {
    width: 100%; text-align: left;
    padding: 22px 0; display: flex; justify-content: space-between; align-items: center;
    font-size: 17px; font-weight: 600; color: var(--ink);
    gap: 24px;
  }
  .faq-q:hover { color: var(--pink); }
  .faq-toggle {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--line-2);
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; line-height: 1; color: var(--pink);
    flex-shrink: 0;
    transition: transform .2s ease;
  }
  .faq-item.open .faq-toggle { background: var(--pink); color: #fff; border-color: var(--pink); transform: rotate(45deg); }
  .faq-a {
    max-height: 0; overflow: hidden;
    transition: max-height .3s ease;
    font-size: 15px; line-height: 1.6; color: var(--ink-2);
  }
  .faq-item.open .faq-a { max-height: 400px; padding-bottom: 22px; }

  /* ---- CTA ---- */
  .cta-final {
    padding: 140px 0; text-align: center;
    background:
      radial-gradient(700px 500px at 50% 100%, var(--pink-soft) 0%, transparent 60%),
      #fff;
  }
  .cta-final h2 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500;
    font-size: clamp(44px, 6vw, 84px); line-height: 1.04; letter-spacing: -0.025em;
    margin: 0 0 24px;
  }
  .cta-final h2 em { font-style: italic; color: var(--pink); }
  .cta-final p { font-size: 18px; color: var(--ink-2); max-width: 480px; margin: 0 auto 32px; }

  /* ---- FOOTER ---- */
  footer {
    background: linear-gradient(180deg, var(--pink-deep) 0%, #5a0e2b 100%);
    color: #fde8ef;
    padding: 72px 0 32px;
  }
  .foot-grid {
    display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 48px;
    padding-bottom: 56px;
    border-bottom: 1px solid rgba(255,255,255,.18);
  }
  @media (max-width: 800px) { .foot-grid { grid-template-columns: 1fr 1fr; gap: 32px; } }
  .foot h4 {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,.55); margin: 0 0 18px;
    font-weight: 500;
  }
  .foot ul { list-style: none; padding: 0; margin: 0; }
  .foot ul li { margin-bottom: 10px; }
  .foot ul li a { color: rgba(255,255,255,.85); font-size: 14px; }
  .foot ul li a:hover { color: var(--pink-3); }
  .foot-logo img { height: 36px; filter: brightness(0) invert(1); margin-bottom: 24px; display: block; }
  .foot-tag {
    font-family: 'Newsreader', Georgia, serif; font-size: 24px; font-style: italic;
    line-height: 1.3; max-width: 280px; margin-bottom: 20px;
    color: #fff;
  }
  .foot-bottom {
    display: flex; justify-content: space-between;
    padding-top: 32px; font-size: 12px; color: rgba(255,255,255,.55);
    flex-wrap: wrap; gap: 16px;
  }
  .foot-disclaimer {
    font-size: 11px; line-height: 1.55; color: rgba(255,255,255,.5);
    padding-top: 24px;
  }

  /* progress bar */
  .progress {
    height: 4px; background: rgba(184,35,92,.15); border-radius: 999px; overflow: hidden;
    margin-top: 16px; max-width: 240px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink-3) 0%, var(--pink) 100%);
    transition: width .3s ease;
  }

  /* small banner */
  .banner {
    background: linear-gradient(90deg, var(--pink-deep) 0%, var(--pink) 100%);
    color: #fff;
    text-align: center; padding: 10px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 0.08em;
  }
  .banner .dot { color: var(--pink-soft); margin: 0 10px; }

  /* ---- SIMPLIFIED FOOTER (overrides) ---- */
  .foot-simple {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding-bottom: 48px;
    gap: 14px;
    border-bottom: 1px solid rgba(255,255,255,.18);
  }
  .foot-logo-large {
    width: 150px;
    height: 150px;
    object-fit: contain;
    filter: brightness(0) invert(1);
    display: block;
    margin-bottom: 8px;
  }
  .foot-simple .foot-tag {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 22px;
    font-style: italic;
    line-height: 1.4;
    color: #fff;
    max-width: 460px;
    margin: 0;
  }
  .foot-email {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,.7);
    text-decoration: none;
  }
  .foot-email:hover { color: var(--pink-3); }
  footer .foot-bottom { justify-content: center; gap: 24px; }
  footer .foot-disclaimer { text-align: center; max-width: 760px; margin: 0 auto; }

  /* ---- FULL-BLEED HERO (overrides) ---- */
  .hero.hero-full {
    position: relative;
    overflow: hidden;
    padding: 0;
    min-height: 88vh;
    display: flex;
    align-items: center;
    background: #1a1216;
  }
  .hero.hero-full .hero-bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    filter: saturate(0.95) contrast(1.02);
  }
  .hero.hero-full .hero-scrim {
    position: absolute; inset: 0;
    z-index: 1;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.62) 35%, rgba(26,18,22,0.88) 100%),
      radial-gradient(70% 60% at 50% 50%, rgba(0,0,0,0.30) 0%, rgba(0,0,0,0.62) 100%);
  }
  .hero.hero-full .hero-content {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 110px 32px;
    display: flex;
    justify-content: center;
    text-align: center;
  }
  .hero.hero-full .hero-content > div {
    max-width: 820px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hero.hero-full h1 { color: #fff; text-shadow: 0 2px 30px rgba(0,0,0,0.55); }
  .hero.hero-full h1 em { color: var(--pink-3); font-style: italic; }
  .hero.hero-full .hero-sub {
    color: rgba(255,255,255,0.95);
    max-width: 640px;
    margin-left: auto; margin-right: auto;
    text-shadow: 0 1px 18px rgba(0,0,0,0.6);
  }
  .hero.hero-full .hero-checks {
    list-style: none;
    padding: 0;
    margin: 8px 0 36px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 36px;
    text-align: left;
    max-width: 720px;
  }
  .hero.hero-full .hero-checks li {
    color: rgba(255,255,255,0.96);
    font-size: 14px;
    display: flex; align-items: flex-start; gap: 10px;
    line-height: 1.4;
    text-shadow: 0 1px 12px rgba(0,0,0,0.55);
  }
  .hero.hero-full .hero-checks .check {
    background: var(--pink); color: #fff;
    flex: 0 0 16px; margin-top: 2px;
  }
  .hero.hero-full .hero-cta { justify-content: center; }
  @media (max-width: 640px) {
    .hero.hero-full .hero-checks { grid-template-columns: 1fr; gap: 10px; }
  }
  .hero.hero-full .btn-ghost {
    background: rgba(255,255,255,0.10);
    color: #fff;
    border-color: rgba(255,255,255,0.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .hero.hero-full .btn-ghost:hover {
    background: #fff;
    color: var(--pink-deep);
    border-color: #fff;
  }
  .hero-tag {
    position: absolute;
    bottom: 32px; right: 32px;
    z-index: 3;
    background: #fff;
    padding: 16px 18px;
    border-radius: 6px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    max-width: 340px;
  }
  .hero-tag .tag-num {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 38px; color: var(--pink);
    line-height: 1; font-weight: 500; font-style: italic;
  }
  .hero-tag .tag-text { font-size: 12px; color: var(--ink-2); line-height: 1.4; }
  @media (max-width: 760px) {
    .hero.hero-full { min-height: 78vh; }
    .hero.hero-full .hero-content { padding: 80px 24px; }
    .hero-tag { display: none; }
  }

  /* ---- TIGHTER SECTION SPACING (-25%) ---- */
  .quiz { padding: 72px 0; }
  .science { padding: 90px 0; }
  /* Treatments sits above How-it-works. Tighter gap between them. */
  .treatments { padding: 32px 0 48px; }
  /* How-it-works: more top space (between gap above and "From get approved..." h2) */
  .how { padding: 72px 0 96px; }
  .how-head { margin: 0 auto 56px; }
  .how h2 { margin: 18px 0 20px; }
  .compare { padding: 48px 0; }
  .reviews { padding: 90px 0; }
  .faq { padding: 48px 0; }
  .cta-final { padding: 56px 0 80px; }
  /* Final CTA: more breathing room between eyebrow and headline */
  .cta-final .eyebrow { margin-bottom: 32px; }
  /* Tighter timeline steps — less scrolling */
  .step-row { padding-bottom: 60px; }
  @media (max-width: 760px) { .step-row { padding-bottom: 44px; } }

  /* ---- SHORTER, SMALLER HERO ---- */

  .hero.hero-full .hero-content { padding: 72px 32px; }
  .hero.hero-full h1 {
    font-size: clamp(26px, 3.4vw, 46px);
    margin: 0 0 14px;
    line-height: 1.1;
  }
  .hero.hero-full .hero-sub { font-size: 16px; max-width: 560px; }
  .hero.hero-full .hero-checks li { font-size: 13px; }
  .hero.hero-full .hero-checks { margin: 6px 0 28px; }
  @media (max-width: 760px) {
    .hero.hero-full { min-height: 58vh; }
    .hero.hero-full .hero-content { padding: 56px 24px; }
  }

  /* ---- ULTRA-SLIM FOOTER (-70% padding) ---- */
  footer { padding: 8px 0 8px; margin-top: 0; }
  footer .foot-simple {
    padding-bottom: 7px;
    gap: 3px;
    border-bottom: 1px solid rgba(255,255,255,.14);
  }
  footer .foot-logo-large { margin-bottom: 0; }
  footer .foot-simple .foot-tag { font-size: 18px; }
  footer .foot-bottom { padding-top: 5px; font-size: 11px; }
  footer .foot-disclaimer { padding-top: 4px; font-size: 10px; }

  /* ---- Footer legal links (Privacy, Terms) ---- */
  .foot-legal-links { display: inline-flex; align-items: center; gap: 8px; }
  .foot-legal-links a {
    color: rgba(255,255,255,.85);
    text-decoration: underline;
    text-underline-offset: 2px;
    font-size: 11px;
  }
  .foot-legal-links a:hover { color: #fff; }
  .foot-legal-links .sep { color: rgba(255,255,255,.45); }

  /* ====================================================
     EDITORIAL HERO — full-bleed photo + giant display
     ==================================================== */

  /* Hide announcement banner so editorial nav floats cleanly */
  body > .banner { display: none; }

  /* Transparent fixed nav (logo left, button right) — turns white on scroll */
  .nav.nav-editorial {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: transparent;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border-bottom: 1px solid transparent;
    box-shadow: none;
    z-index: 50;
    transition: background .25s ease, border-color .25s ease, box-shadow .25s ease, backdrop-filter .25s ease;
  }
  .nav.nav-editorial.scrolled {
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom-color: var(--line);
    box-shadow: 0 2px 14px rgba(20, 18, 22, .04);
  }
  .nav.nav-editorial .nav-inner {
    padding: 18px 48px 18px 96px;
    max-width: 100%;
    margin: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;

    min-width: 0;
    overflow: hidden;
  }
  .nav.nav-editorial .nav-cta {
    position: fixed;
    top: 95px;
    right: 48px;
    z-index: 60;
    display: flex;
    gap: 12px;
    align-items: center;
    transition: top .25s ease;
  }
  .nav.nav-editorial.scrolled .nav-cta {
    top: 58px;
  }
  .nav.nav-editorial .nav-btn {
    padding: 11px 22px;
    font-size: 14px;
    white-space: nowrap;
  }
  .nav.nav-editorial .nav-logo {
    height: 190px;

  .nav.nav-editorial.scrolled .nav-logo {
    height: 144px;
  }

  /* Hero section (20% shorter than viewport) */
  .hero.hero-editorial {
    position: relative;
    width: 100%;
    height: auto;
    min-height: 80vh;
    max-height: none;
    padding: 0 0 56px;
    margin: 0;
    background: var(--paper);
    overflow: hidden;
  }
  .hero.hero-editorial .hero-bg-img {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 75% center;
    z-index: 0;
    /* Soft fade on left edge — image blends into white bg behind text */
    mask-image: linear-gradient(to right, transparent 0%, #000 28%, #000 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 28%, #000 100%);
  }
  .hero.hero-editorial .hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right,
      rgba(255,255,255,0.95) 0%,
      rgba(255,255,255,0.75) 30%,
      rgba(255,255,255,0.25) 58%,
      transparent 78%
    );
    z-index: 1;
    pointer-events: none;
  }

  /* Giant HERESTROGEN display text */
  .hero-display {
    position: absolute;
    top: 95px;
    left: 0;
    right: 0;
    font-family: 'Newsreader', Georgia, serif;
    font-size: clamp(72px, 11vw, 155px);
    font-weight: 900;
    letter-spacing: -0.025em;
    text-transform: uppercase;
    color: var(--pink);
    line-height: 0.92;
    text-align: center;
    z-index: 2;
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
    margin: 0;
    padding: 0 20px;
  }

  /* Top-anchored content stack — sits below the nav so the logo can never overlap */
  .hero-editorial-content {
    position: relative;
    top: auto;
    bottom: auto;
    left: 0;
    padding: 220px 24px 0 96px;
    max-width: 720px;
    z-index: 3;
  }
  .hero-editorial-content .hero-stars {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    font-size: 13px;
    color: var(--ink-2);
  }
  .hero-editorial-content .hero-stars .stars {
    color: var(--pink);
    letter-spacing: 0.1em;
    font-size: 15px;
  }
  .hero.hero-editorial h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(30px, 3.8vw, 48px);
    line-height: 1.08;
    letter-spacing: -0.02em;
    margin: 0 0 16px;
    color: var(--ink);
  }
  .hero.hero-editorial h1 em {
    font-style: italic;
    color: var(--pink);
    font-weight: 500;
  }
  .hero.hero-editorial .hero-sub {
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink-2);
    max-width: 460px;
    margin: 0 0 14px;
  }
  .hero-sub-underline {
    text-decoration: underline;
    text-decoration-color: var(--pink);
    text-decoration-thickness: 2px;
    text-underline-offset: 3px;
    font-weight: 600;
    color: var(--ink);
  }
  .hero.hero-editorial .hero-checks {
    list-style: none;
    padding: 0;
    margin: 0 0 20px;
    font-size: 12.5px;
    color: var(--ink-2);
    line-height: 1.45;
  }
  .hero.hero-editorial .hero-checks li {
    padding: 3px 0;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .hero.hero-editorial .hero-checks .check {
    color: #2d7a5f;
    flex-shrink: 0;
    font-weight: 700;
    width: auto;
    height: auto;
    background: none;
    display: inline;
    font-size: 13px;
  }
  .hero.hero-editorial .hero-cta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin: 0;
  }

  /* Press strip floating at bottom of hero */
  .hero-press-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 60px 32px;
    display: flex;
    align-items: center;
    gap: 32px;
    z-index: 3;
    pointer-events: none;
  }
  .hero-press-strip .label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-2);
    opacity: .6;
    white-space: nowrap;
  }
  .hero-press-strip .logos {
    display: flex;
    flex: 1;
    justify-content: space-around;
    align-items: center;
    gap: 28px;
  }
  .hero-press-strip .logo {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 16px;
    color: var(--ink-2);
    opacity: .55;
    letter-spacing: -0.01em;
    font-style: italic;
  }

  /* Tablet */
  /* Tablet-laptop — scale logo + paddings down so logo doesn't crash headline */
  @media (max-width: 1279px) {
    .hero.hero-editorial .hero-gradient {
      background: linear-gradient(to right,

      );

    .nav.nav-editorial .nav-inner { padding: 18px 36px 18px 64px; }

    .nav.nav-editorial.scrolled .nav-logo { height: 96px; }
    .nav.nav-editorial .nav-cta { right: 36px; top: 76px; }
    .nav.nav-editorial.scrolled .nav-cta { top: 48px; }
  }

  /* Mid-tablet — further scale down, intermediate between 767 and 1279 */
  @media (max-width: 1023px) {
    .hero.hero-editorial { min-height: 600px; max-height: 720px; }
    .hero.hero-editorial .hero-bg-img { right: 0; width: 100%; object-position: 75% center; }
    .hero.hero-editorial .hero-gradient {
      background: linear-gradient(to right,
        rgba(255,255,255,0.94) 0%,
        rgba(255,255,255,0.88) 40%,

      );

    .nav.nav-editorial .nav-inner { padding: 16px 28px 16px 40px; }
    .nav.nav-editorial .nav-logo { height: 110px; }
    .nav.nav-editorial.scrolled .nav-logo { height: 76px; }
    .nav.nav-editorial .nav-btn { padding: 10px 18px; font-size: 13px; }
    .nav.nav-editorial .nav-cta { right: 28px; top: 54px; }
    .nav.nav-editorial.scrolled .nav-cta { top: 38px; }
  }

  /* Mobile */
  @media (max-width: 767px) {
    /* Hero sizes to its content on mobile — no forced viewport height. */
    .hero.hero-editorial {
      min-height: 0;
      height: auto;
      max-height: none;
      overflow: visible;
    }
    .hero.hero-editorial .hero-bg-img {
      right: 0;
      left: 0;
      width: 100%;
      object-position: 70% 40%;
      opacity: 0.5;
      filter: brightness(0.92);
      mask-image: linear-gradient(to bottom, transparent 0%, #000 14%, #000 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 14%, #000 100%);
    }
    .hero.hero-editorial .hero-gradient {
      background: linear-gradient(to bottom,
        rgba(255,255,255,0.78) 0%,
        rgba(255,255,255,0.70) 22%,
        rgba(255,255,255,0.55) 42%,
        rgba(255,255,255,0.38) 62%,
        rgba(255,255,255,0.20) 82%,
        rgba(255,255,255,0.05) 100%
      );
    }
    .hero.hero-editorial .hero-sub {
      color: var(--ink);

      text-shadow: none;
    }
    .hero.hero-editorial .hero-checks {
      color: var(--ink);
      font-weight: 600;
    }
    .hero.hero-editorial .hero-checks li {
      text-shadow: none;
    }
    /* Make sure the Am I Qualified? CTA never overflows / gets clipped on mobile */
    .hero.hero-editorial .hero-cta {
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }
    .hero.hero-editorial .hero-cta .btn {
      max-width: 100%;
      white-space: normal;
      box-shadow: 0 6px 18px rgba(184, 35, 92, 0.32);
    }
    .hero-display {
      font-size: clamp(52px, 14vw, 80px);
      top: 72px;
    }
    .hero.hero-editorial h1 { font-size: clamp(30px, 7.2vw, 40px); line-height: 1.1; }
    .hero.hero-editorial .hero-sub { font-size: 16px; line-height: 1.55; margin-left: auto; margin-right: auto; }
    .hero.hero-editorial .hero-checks { font-size: 14px; display: inline-block; text-align: left; }
    .hero.hero-editorial .hero-checks .check { font-size: 15px; }
    .hero-editorial-content {
      padding: 200px 24px 0 24px;
      top: auto;
      max-width: 100%;
      text-align: center;
    }
    /* Just a small breathing room under the CTA — section ends right after. */
    .hero.hero-editorial .hero-cta {
      margin-bottom: 0;
    }
    .hero.hero-editorial { padding-bottom: 24px; }
    .hero-editorial-content .hero-stars { justify-content: center; }
    .hero-editorial-content .hero-cta { justify-content: center; flex-wrap: wrap; }
    .nav.nav-editorial .nav-inner { padding: 18px 24px; }
    .nav.nav-editorial.scrolled .nav-inner { padding: 14px 24px; }
    .nav.nav-editorial .nav-logo { height: 160px; }
    .nav.nav-editorial.scrolled .nav-logo { height: 108px; }
    .nav.nav-editorial .nav-btn { padding: 13px 22px; font-size: 14.5px; font-weight: 600; }
    .nav.nav-editorial .nav-cta { right: 18px; top: 78px; }
    .nav.nav-editorial.scrolled .nav-cta { top: 52px; }
    .hero-press-strip {
      padding: 0 24px 18px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hero-press-strip .label { font-size: 9px; }
    .hero-press-strip .logos { gap: 12px; }
    .hero-press-strip .logo { font-size: 11px; }
    .hero-press-strip .logo:nth-child(n+4) { display: none; }
  }

  @media (max-width: 480px) {
    .hero.hero-editorial h1 { font-size: clamp(26px, 7.5vw, 34px); line-height: 1.1; }
    .hero.hero-editorial .hero-sub { font-size: 15px; }
    .hero.hero-editorial .hero-checks { font-size: 13.5px; }
    .hero-editorial-content { padding-top: 170px; }
    .nav.nav-editorial .nav-logo { height: 120px; }
    .nav.nav-editorial.scrolled .nav-logo { height: 84px; }
    .nav.nav-editorial .nav-inner { padding: 16px 18px; }
    .nav.nav-editorial.scrolled .nav-inner { padding: 12px 18px; }
    .nav.nav-editorial .nav-btn { padding: 11px 18px; font-size: 13.5px; font-weight: 600; }
    .nav.nav-editorial .nav-cta { right: 14px; top: 60px; }
    .nav.nav-editorial.scrolled .nav-cta { top: 42px; }
  }

  /* Tiny screens — keep logo + button from crashing into each other */
  @media (max-width: 380px) {
    .nav.nav-editorial .nav-logo { height: 96px; }
    .nav.nav-editorial.scrolled .nav-logo { height: 68px; }
    .nav.nav-editorial .nav-btn { padding: 10px 15px; font-size: 12.5px; font-weight: 600; }
    .nav.nav-editorial .nav-cta { right: 10px; top: 50px; }
    .nav.nav-editorial.scrolled .nav-cta { top: 34px; }
  }

  /* ---- BUNDLE SECTION (The Complete Protocol) ---- */
  .bundle-section {
    padding: 88px 0 80px;
    background: linear-gradient(180deg, var(--pink-softer) 0%, #fff 100%);
  }
  .bundle-head {
    text-align: center;
    max-width: 780px;
    margin: 0 auto 40px;
  }
  .bundle-head .eyebrow {
    display: inline-block;
    background: var(--pink);
    color: #fff;
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  .bundle-head h2 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(28px, 4vw, 44px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0 0 12px;
    color: var(--ink);
  }
  .bundle-head h2 em { font-style: italic; color: var(--pink); }
  .bundle-head p { color: var(--muted); font-size: 16px; margin: 0; }

  .bundle-card {
    position: relative;
    max-width: 1080px;
    margin: 0 auto;
    background: #fff;
    border: 2px solid var(--pink);
    border-radius: 18px;
    padding: 44px 42px;
    box-shadow: 0 30px 70px -20px rgba(184, 35, 92, .18);
  }
  .bundle-badge {
    position: absolute;
    top: -14px;
    left: 42px;
    background: var(--pink);
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 999px;
    font-weight: 600;
  }
  .bundle-name {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(28px, 3.4vw, 38px);
    line-height: 1.1;
    margin: 4px 0 4px;
    color: var(--ink);
  }
  .bundle-subtitle {
    font-family: 'Newsreader', Georgia, serif;
    font-style: italic;
    color: var(--pink-deep);
    font-size: 17px;
    margin: 0 0 22px;
  }
  .bundle-desc {
    color: var(--ink-2);
    font-size: 15px;
    line-height: 1.65;
    margin: 0 0 26px;
  }

  .bundle-price-box {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 24px;
    align-items: center;
    background: var(--pink-softer);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 24px;
  }
  @media (max-width: 700px) { .bundle-price-box { grid-template-columns: 1fr; } }
  .bundle-individual { font-size: 14px; color: var(--ink-2); line-height: 1.8; }
  .bundle-individual strong { color: var(--ink); }
  .bundle-individual-total { padding-top: 6px; border-top: 1px dashed var(--line-2); margin-top: 6px; }
  .bundle-individual-total .strike { text-decoration: line-through; color: var(--muted); }
  .bundle-final {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 18px;
    text-align: center;
  }
  .bundle-final-price {
    font-family: 'Newsreader', Georgia, serif;
    font-style: italic;
    font-size: 44px;
    font-weight: 500;
    color: var(--pink);
    line-height: 1;
  }
  .bundle-final-price .bundle-final-unit {
    font-size: 14px;
    font-style: normal;
    color: var(--muted);
    margin-left: 4px;
  }
  .bundle-final-save { font-size: 12px; color: var(--green, #2d7a5f); font-weight: 600; margin-top: 6px; }

  .bundle-options { margin-bottom: 28px; }
  .bundle-options-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .bundle-options-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  @media (max-width: 700px) { .bundle-options-grid { grid-template-columns: 1fr 1fr; } }
  .bundle-option {
    position: relative;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 14px 12px;
    text-align: center;
  }
  .bundle-option.best { border-color: var(--pink); background: var(--pink-softer); }
  .bundle-option .bo-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .bundle-option .bo-price {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: 22px;
    color: var(--pink-deep);
  }
  .bundle-option .bo-price span { font-size: 11px; color: var(--muted); }
  .bundle-option .bo-badge {
    position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    background: var(--pink);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .bundle-points {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 26px;
  }
  @media (max-width: 760px) { .bundle-points { grid-template-columns: 1fr; } }
  .bundle-point {
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 12px;
    align-items: flex-start;
  }
  .bundle-point-icon { font-size: 22px; line-height: 1.2; }
  .bundle-point h4 {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    margin: 0 0 4px;
  }
  .bundle-point p { font-size: 13px; color: var(--ink-2); line-height: 1.5; margin: 0; }

  .bundle-included {
    background: var(--pink-softer);
    border-radius: 10px;
    padding: 22px 24px;
    margin-bottom: 26px;
  }
  .bundle-included h4 {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--pink-deep);

    padding: 0;

    gap: 8px 18px;

  @media (max-width: 760px) { .bundle-included ul { grid-template-columns: 1fr; } }
  .bundle-included ul li {
    padding-left: 22px;
    position: relative;
    font-size: 13.5px;
    color: var(--ink-2);
    line-height: 1.5;

  .bundle-cta-wrap { text-align: center; }
  .bundle-cta {
    padding: 16px 36px !important;
    font-size: 15px !important;
    box-shadow: 0 14px 36px rgba(184, 35, 92, .28) !important;

  .bundle-fineprint {
    font-size: 12px;
    color: var(--muted);
    margin: 14px auto 0;
    max-width: 540px;
    line-height: 1.5;
  }

  @media (max-width: 640px) {
    .bundle-section { padding: 56px 0; }
    .bundle-card { padding: 32px 22px; }
    .bundle-badge { left: 22px; }
    .bundle-cta { padding: 14px 24px !important; font-size: 14px !important; }
  }

  /* ===========================================================
     EDUCATIONAL CONVERSION SECTION — "Why HRT"
     Sits between Hero and Treatments. Reuses existing tokens.
     =========================================================== */
  .edu-section {
    padding: clamp(56px, 9vw, 96px) 0 0;
    background: linear-gradient(180deg, #fff 0%, var(--pink-softer) 55%, var(--pink-soft) 100%);
  }
  .edu-section .container { max-width: 1240px; padding: 0 32px; }

  /* 1 · Hook pill */
  .edu-hook { text-align: center; margin-bottom: 22px; }
  .edu-hook-pill {
    display: inline-block;
    background: var(--pink-softer);
    color: var(--pink-deep);
    border: 1px solid var(--line-2);
    border-radius: 999px;
    padding: 7px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  /* 2 · Headline block */
  .edu-head {
    text-align: center;
    max-width: 760px;
    margin: 0 auto 56px;
  }
  .edu-head .eyebrow {
    color: var(--pink);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .edu-head h2 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(32px, 5vw, 56px);
    line-height: 1.05;
    letter-spacing: -0.022em;
    margin: 0 0 18px;
    color: var(--ink);
  }
  .edu-head h2 em { font-style: italic; color: var(--pink); }
  .edu-head .edu-sub {
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink-2);
    max-width: 620px;
    margin: 0 auto;
  }

  /* 3 · Three-column WHY block */
  .edu-why-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
