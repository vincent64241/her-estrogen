<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Your Results — Her Estrogen</title>
<meta name="description" content="Your personalized Her Estrogen hormone restoration plan." />
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=3" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png?v=3" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png?v=3" />
<link rel="shortcut icon" href="assets/favicon-32.png?v=3" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=DM+Sans:opsz,wght@9..40,300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #b8235c;
    --pink-2: #d04a7e;
    --pink-3: #ec84a8;
    --pink-soft: #fde8ef;
    --pink-softer: #fef5f8;
    --pink-deep: #8a1745;
    --cream: #fdf6f0;
    --green: #2d7a5f;
    --green-soft: #e8f3ee;
    --ink: #1a1216;
    --ink-2: #3d2b33;
    --muted: #6b6b6b;
    --line: #f0d9e2;
    --line-2: #e8c5d2;
    --bg: #fafafa;
    --card: #ffffff;
    --shadow-sm: 0 2px 8px rgba(20,20,20,.06);
    --shadow-md: 0 6px 24px rgba(138,23,69,.08);
    --shadow-lg: 0 20px 50px rgba(138,23,69,.14);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }
  img { max-width: 100%; display: block; }
  .serif { font-family: 'Newsreader', Georgia, serif; }
  .mono { font-family: 'DM Mono', ui-monospace, monospace; }

  /* ---------- PHASE 1: EMAIL CAPTURE ---------- */
  .capture {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    background:
      radial-gradient(900px 600px at 80% 10%, var(--pink-soft) 0%, transparent 55%),
      radial-gradient(700px 500px at 10% 90%, var(--pink-softer) 0%, transparent 55%),
      #fff;
  }
  .capture-card {
    max-width: 480px; width: 100%;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 44px 36px;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }
  .capture-logo { height: 36px; margin: 0 auto 28px; }
  .capture h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(26px, 4vw, 34px);
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin: 0 0 12px;
    color: var(--ink);
  }
  .capture h1 em { font-style: italic; color: var(--pink); }
  .capture-sub { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
  .capture form { display: flex; flex-direction: column; gap: 12px; text-align: left; }
  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 4px;
  }
  .input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--line-2);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: #fff;
    color: var(--ink);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .input:focus { outline: none; border-color: var(--pink); box-shadow: 0 0 0 3px rgba(184,35,92,.12); }
  .input.error { border-color: #c33; }
  .field-error { color: #c33; font-size: 12px; margin-top: 4px; }
  .phone-wrap { display: flex; align-items: stretch; }
  .phone-prefix {
    display: flex; align-items: center; gap: 6px;
    padding: 0 14px;
    background: var(--pink-softer);
    border: 1px solid var(--line-2);
    border-right: none;
    border-radius: 8px 0 0 8px;
    font-size: 14px; color: var(--ink-2);
    white-space: nowrap;
  }
  .phone-wrap .input { border-radius: 0 8px 8px 0; }
  .privacy-note {
    font-size: 12px; color: var(--muted);
    margin: 4px 0 0;
    text-align: center;
  }
  .btn-primary-full {
    width: 100%;
    background: var(--pink); color: #fff;
    padding: 16px 22px;
    border-radius: 999px;
    font-size: 16px; font-weight: 600;
    transition: background .2s ease, transform .15s ease, box-shadow .2s ease;
    box-shadow: 0 4px 18px rgba(184,35,92,.22);
    margin-top: 8px;
  }
  .btn-primary-full:hover { background: var(--pink-deep); transform: translateY(-1px); box-shadow: 0 6px 22px rgba(184,35,92,.32); }
  .btn-primary-full:disabled { background: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

  /* ---------- PHASE 2 SHELL ---------- */
  .results { animation: fadeUp .6s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .container { max-width: 1180px; margin: 0 auto; padding: 0 20px; }
  .narrow { max-width: 920px; margin: 0 auto; padding: 0 20px; }

  /* ---------- URGENCY BAR (sticky) ---------- */
  .urgency-bar {
    position: sticky; top: 0; z-index: 60;
    background: var(--pink-deep);
    color: var(--cream);
    padding: 10px 20px;
    display: flex; align-items: center; justify-content: center; gap: 16px;
    flex-wrap: wrap;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  .urgency-bar .label { letter-spacing: .01em; }
  .urgency-bar .timer {
    color: #ec84a8;
    font-family: 'DM Mono', monospace;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: .04em;
    font-variant-numeric: tabular-nums;
  }
  .urgency-bar.expired .timer { color: #f7c5d4; }

  /* ---------- SECTION SPACING ---------- */
  section { padding: 40px 0; }
  @media (min-width: 760px) { section { padding: 50px 0; } }

  /* ---------- APPROVAL HEADLINE ---------- */
  .approval { background: #fff; padding-top: 72px; }
  .approval .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--pink); margin-bottom: 12px;
    display: inline-block;
    padding: 6px 12px; background: var(--pink-soft); border-radius: 999px;
  }
  .approval h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(28px, 4.4vw, 42px);
    line-height: 1.08;
    letter-spacing: -0.022em;
    margin: 8px 0 14px;
    color: var(--ink);
  }
  .approval h1 em { font-style: italic; color: var(--pink); }
  .approval-sub {
    font-size: 16px; color: var(--ink-2);
    max-width: 620px; margin: 0 0 32px;
    line-height: 1.55;
  }
  .data-cards {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  .data-cards.two { grid-template-columns: 1fr 1fr; max-width: 540px; }
  @media (max-width: 700px) { .data-cards, .data-cards.two { grid-template-columns: 1fr; } }

  /* ---- Symptoms block ---- */
  .symptoms-block {
    margin: 4px 0 28px;
    padding: 18px 20px;
    background: var(--pink-softer);
    border: 1px solid var(--line-2);
    border-radius: 10px;
  }
  .symptoms-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .symptoms-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .symptom-tag {
    display: inline-flex;
    align-items: center;
    background: #fff;
    color: var(--pink-deep);
    border: 1px solid var(--line-2);
    padding: 7px 13px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
  }
  .symptom-tag::before {
    content: '✓';
    color: var(--green);
    font-weight: 700;
    margin-right: 6px;
    font-size: 12px;
  }
  @media (max-width: 540px) {
    .symptom-tag { font-size: 12px; padding: 6px 11px; }
    .symptoms-block { padding: 14px 16px; margin-bottom: 22px; }
  }
  .data-card {
    background: var(--cream);
    border: 1px solid var(--line-2);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .data-card .label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .data-card .value {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 22px; font-weight: 500;
    color: var(--ink);
    line-height: 1.1;
  }

  /* ---------- SUCCESS PROBABILITY ---------- */
  .probability {
    background: #fff;
    border: 1px solid var(--line);
    border-left: 4px solid var(--pink);
    border-radius: 10px;
    padding: 28px;
    display: grid; grid-template-columns: 1.4fr 1fr; gap: 24px;
    align-items: center;
    margin-bottom: 18px;
    box-shadow: var(--shadow-sm);
  }
  @media (max-width: 700px) { .probability { grid-template-columns: 1fr; text-align: center; } }
  .probability-text {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 19px; font-weight: 500;
    line-height: 1.35;
    color: var(--ink);
  }
  .probability-stat {
    font-family: 'Newsreader', Georgia, serif;
    font-size: clamp(48px, 8vw, 72px);
    font-weight: 500;
    color: var(--pink);
    line-height: 1;
    text-align: right;
  }
  @media (max-width: 700px) { .probability-stat { text-align: center; } }
  .probability-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
    text-align: right;
  }
  @media (max-width: 700px) { .probability-label { text-align: center; } }
  .progress {
    height: 8px; background: var(--pink-soft);
    border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink-3) 0%, var(--pink) 100%);
    border-radius: 999px;
    transition: width 1.2s cubic-bezier(.4,0,.2,1);
  }

  /* ---------- TIMELINE CHART ---------- */
  .timeline-section { background: var(--cream); padding: 50px 0; }
  .section-title {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(24px, 3.4vw, 34px);
    line-height: 1.1;
    letter-spacing: -0.018em;
    margin: 0 0 8px;
    color: var(--ink);
  }
  .section-title em { font-style: italic; color: var(--pink); }
  .section-sub { color: var(--muted); font-size: 15px; margin: 0 0 28px; }
  .chart-wrap {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px 20px 18px;
    overflow-x: auto;
  }
  .chart-svg { width: 100%; min-width: 520px; height: 240px; display: block; }

  /* ---------- RECOMMENDATION ---------- */
  .recommend {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px;
    display: grid; grid-template-columns: 1.5fr 1fr; gap: 28px;
    align-items: center;
    box-shadow: var(--shadow-sm);
  }
  @media (max-width: 760px) { .recommend { grid-template-columns: 1fr; } }
  .recommend-badge {
    display: inline-block;
    background: var(--green); color: #fff;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
    margin-bottom: 14px;
  }
  .recommend h3 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: 22px;
    margin: 0 0 8px;
  }
  .recommend p { color: var(--ink-2); margin: 0 0 12px; font-size: 15px; line-height: 1.6; }
  .recommend .small-badge {
    display: inline-block;
    background: var(--pink-soft);
    color: var(--pink-deep);
    font-size: 11px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 999px;
    margin-top: 6px;
  }
  .vial-wrap {
    aspect-ratio: 1 / 1;
    background: var(--pink-softer);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    overflow: hidden;
  }
  .rec-product-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 14px 24px rgba(138,23,69,.15));
  }
  @media (max-width: 760px) { .vial-wrap { aspect-ratio: 16 / 10; padding: 16px; max-width: 380px; margin: 0 auto; } }

  /* ---------- GOALS ---------- */
  .goals { display: grid; gap: 12px; }
  .goal {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 20px;
    display: flex; align-items: flex-start; gap: 14px;
  }
  .goal-check {
    flex: 0 0 28px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--green-soft);
    color: var(--green);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    margin-top: 2px;
  }
  .goal-text { color: var(--ink-2); font-size: 15px; line-height: 1.5; }
  .goal-text strong { color: var(--ink); font-weight: 600; }

  /* ---------- INCLUDED ---------- */
  .included-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px;
    box-shadow: var(--shadow-sm);
  }
  .included-list { display: grid; gap: 18px; }
  .included-row {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    gap: 16px;
    align-items: start;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .included-row:last-of-type { border-bottom: 0; padding-bottom: 0; }
  .included-row .icon {
    font-size: 22px;
    line-height: 1.2;
    padding-top: 2px;
  }
  .included-text { display: flex; flex-direction: column; gap: 4px; }
  .included-title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14.5px;
    color: var(--ink);
    line-height: 1.3;
  }
  .included-body {
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink-2);
  }
  .included-value {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--pink);
    background: var(--pink-softer);
    border: 1px solid var(--line-2);
    padding: 6px 10px;
    border-radius: 999px;
    white-space: nowrap;
    align-self: start;
  }
  @media (max-width: 540px) {
    .included-row {
      grid-template-columns: 28px 1fr;
      row-gap: 6px;
    }
    .included-value { grid-column: 2 / -1; justify-self: start; }
  }

  /* Total value vs you pay — sales-page math */
  .included-total {
    margin-top: 22px;
    padding: 18px 22px;
    background: linear-gradient(135deg, var(--pink-deep) 0%, var(--pink) 100%);
    color: #fff;
    border-radius: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: center;
    box-shadow: 0 12px 28px rgba(138,23,69,.18);
  }
  .included-total-left,
  .included-total-right { display: flex; flex-direction: column; gap: 2px; }
  .included-total-right { text-align: right; }
  .included-total-label {
    font-family: 'DM Mono', monospace;
    font-size: 10.5px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(255,255,255,.78);
  }
  .included-total-value {
    font-family: 'Newsreader', Georgia, serif;
    font-style: italic;
    font-weight: 600;
    font-size: 26px;
    line-height: 1;
    color: #fff;
    text-decoration: line-through;
    text-decoration-color: rgba(255,255,255,.55);
    text-decoration-thickness: 2px;
  }
  .included-total-pay {
    font-family: 'Newsreader', Georgia, serif;
    font-style: italic;
    font-weight: 600;
    font-size: 28px;
    line-height: 1;
    color: #fff;
  }
  @media (max-width: 540px) {
    .included-total { grid-template-columns: 1fr; padding: 16px 18px; }
    .included-total-right { text-align: left; }
  }

  .included-note {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
  }

  /* Provider Approval Guarantee — sits below the value stack */
  .approval-guarantee {
    margin-top: 22px;
    padding: 22px 26px;
    background: var(--green-soft);
    border: 1px solid #b8dcc8;
    border-left: 4px solid var(--green);
    border-radius: 12px;
    box-shadow: 0 4px 12px rgba(45, 122, 95, .06);
  }
  .approval-guarantee-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .approval-guarantee-icon { font-size: 18px; }
  .approval-guarantee-head strong {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 600;
    font-size: 18px;
    color: var(--green);
    letter-spacing: -0.01em;
  }
  .approval-guarantee p {
    margin: 0;
    font-family: 'Newsreader', Georgia, serif;
    font-style: italic;
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink-2);
  }
  @media (max-width: 540px) {
    .approval-guarantee { padding: 18px 20px; }
    .approval-guarantee-head strong { font-size: 16px; }
    .approval-guarantee p { font-size: 14px; }
  }

  /* ---------- WHAT HAPPENS NEXT (timeline) ---------- */
  .steps { position: relative; padding-left: 32px; }
  .steps::before {
    content: '';
    position: absolute; left: 14px; top: 12px; bottom: 12px;
    width: 2px; background: var(--pink-soft);
  }
  .step {
    position: relative;
    padding-bottom: 26px;
  }
  .step::before {
    content: '';
    position: absolute; left: -32px; top: 4px;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--pink); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600;
  }
  .step.s1::before { content: '1'; }
  .step.s2::before { content: '2'; }
  .step.s3::before { content: '3'; }
  .step.s4::before { content: '4'; }
  .step.s5::before { content: '5'; }
  .step h4 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: 19px;
    margin: 0 0 4px;
    line-height: 1.2;
  }
  .step p { margin: 0; color: var(--ink-2); font-size: 14px; line-height: 1.55; }

  /* ---------- PRICING ---------- */
  .pricing-section { background: var(--cream); padding: 50px 0; }
  .urgency-callout {
    background: linear-gradient(135deg, var(--pink-deep) 0%, var(--pink) 100%);
    color: var(--cream);
    border-radius: 14px;
    padding: 32px 28px;
    text-align: center;
    margin-bottom: 28px;
    box-shadow: var(--shadow-lg);
  }
  .urgency-callout .reserved-pill {
    display: inline-block;
    background: rgba(255,255,255,.16);
    color: #fff;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    letter-spacing: .08em;
    margin-bottom: 14px;
  }
  .urgency-callout h2 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(28px, 4.4vw, 38px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0 0 10px;
    color: #fff;
  }
  .urgency-callout .green-line {
    color: #a5e1c5;
    font-weight: 600;
    font-size: 14px;
    margin-top: 12px;
  }

  .meds-head {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: 22px;
    margin: 8px 0 18px;
  }
  .meds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .meds-grid.four { grid-template-columns: 1fr 1fr; gap: 14px; }
  /* Bundle card spans full width on top */
  .meds-grid.four .med-card.bundle { grid-column: 1 / -1; }
  .meds-grid.four .med-card.bundle.selected { border-width: 2px; }

  /* ---- SINGLE RECOMMENDED CARD ---- */
  .med-card.recommended {
    max-width: 740px;
    margin: 0 auto;
    border-color: var(--pink);
    border-width: 2px;
    box-shadow: 0 20px 50px -16px rgba(184, 35, 92, .2);
    cursor: default;
  }
  .med-card.recommended:hover { transform: none; }
  .med-card.recommended .med-img-wrap { aspect-ratio: 16 / 9; max-height: 240px; }
  .med-card.recommended .med-description {
    font-family: 'Newsreader', Georgia, serif;
    font-style: italic;
